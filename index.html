<style>
  * { -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #0a0c10; font-family: 'Noto Serif TC', serif; }
  #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #c9a84c; font-family: 'IBM Plex Mono', monospace; font-size: 14px; flex-direction: column; gap: 12px; }
  .spin { width: 32px; height: 32px; border: 3px solid #2a3050; border-top-color: #c9a84c; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #pw-gate { position: fixed; inset: 0; background: #0a0c10; z-index: 99999;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    font-family: 'Noto Serif TC', serif; }
  #pw-gate .box { background: #12151e; border: 1px solid #c9a84c;
    border-radius: 8px; padding: 28px 24px; width: 90%; max-width: 320px; text-align: center; }
  #pw-gate h1 { color: #c9a84c; margin: 0 0 4px; font-size: 22px; font-weight: 700; }
  #pw-gate p { color: #8d92aa; font-size: 12px; margin: 0 0 18px; font-family: 'IBM Plex Mono', monospace; }
  /* 密碼點點顯示 */
  #pw-dots { display: flex; justify-content: center; gap: 14px; margin: 4px 0 22px; }
  #pw-dots .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #2a3050; transition: all .15s; }
  #pw-dots .dot.filled { background: #c9a84c; border-color: #c9a84c; }
  /* 9 宮格鍵盤 */
  #pw-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  #pw-keypad .key { aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    background: #1a1f2e; border: 1px solid #2a3050; border-radius: 12px;
    color: #e8e4d8; font-size: 26px; font-weight: 600; font-family: 'IBM Plex Mono', monospace;
    cursor: pointer; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    transition: background .1s; }
  #pw-keypad .key:active { background: #c9a84c; color: #0a0c10; }
  #pw-keypad .key.fn { font-size: 15px; background: transparent; border-color: transparent; color: #8d92aa; }
  #pw-keypad .key.fn:active { background: #2a3050; color: #e8e4d8; }
  #pw-gate .err { color: #d97070; font-size: 12px; margin-top: 16px; min-height: 16px;
    font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>
<script>
var _pwEntered = "";
var _pwTarget = "168168";
var _pwReadonly = "200000"; // 唯讀密碼：只能看統計

function _pwRenderDots() {
  var dots = document.querySelectorAll("#pw-dots .dot");
  for (var i = 0; i < dots.length; i++) {
    if (i < _pwEntered.length) dots[i].classList.add("filled");
    else dots[i].classList.remove("filled");
  }
}

function _pwPress(d) {
  if (_pwEntered.length >= 6) return;
  _pwEntered += d;
  _pwRenderDots();
  var err = document.getElementById("pw-err");
  if (err) err.textContent = "";
  if (_pwEntered.length === 6) {
    setTimeout(_pwSubmit, 120);
  }
}

function _pwDel() {
  _pwEntered = _pwEntered.slice(0, -1);
  _pwRenderDots();
}

function _pwSubmit() {
  if (_pwEntered === _pwTarget) {
    // 完整權限密碼
    try { sessionStorage.setItem("guandi_pw_ok", "1"); } catch(e) {}
    window.__readonly = false;
    document.getElementById("pw-gate").style.display = "none";
    if (!window.__currentUser) {
      _showUserGate();
    }
  } else if (_pwEntered === _pwReadonly) {
    // 唯讀密碼：只能看統計，不記錄身份，直接進入
    try { sessionStorage.setItem("guandi_pw_ok", "ro"); } catch(e) {}
    window.__readonly = true;
    window.__currentUser = null;
    document.getElementById("pw-gate").style.display = "none";
    // 唯讀模式不顯示身份選擇，直接進 App
  } else {
    var err = document.getElementById("pw-err");
    if (err) err.textContent = "密碼錯誤（輸入了 " + _pwEntered + "）";
    _pwEntered = "";
    _pwRenderDots();
    // 震動回饋（支援的裝置）
    try { if (navigator.vibrate) navigator.vibrate(200); } catch(e) {}
    setTimeout(function(){ var e2 = document.getElementById("pw-err"); if(e2) e2.textContent = ""; }, 3000);
  }
}
</script>

  <div class="box">

    <p>請輸入 6 位數密碼</p>

      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div id="pw-keypad">
      <div class="key" onclick="_pwPress('1')">1</div>
      <div class="key" onclick="_pwPress('2')">2</div>
      <div class="key" onclick="_pwPress('3')">3</div>
      <div class="key" onclick="_pwPress('4')">4</div>
      <div class="key" onclick="_pwPress('5')">5</div>
      <div class="key" onclick="_pwPress('6')">6</div>
      <div class="key" onclick="_pwPress('7')">7</div>
      <div class="key" onclick="_pwPress('8')">8</div>
      <div class="key" onclick="_pwPress('9')">9</div>

<div id="user-gate" style="display:none; position:fixed; inset:0; background:#0a0c10; z-index:99998; flex-direction:column; align-items:center; justify-content:center; font-family:'Noto Serif TC',serif;">

const calcReserve = s => {
  // 用公式重算（包含管家小費），舊資料的 reserveOverride 不再優先採用
  const calc = s.totalWater - s.venueFee - s.dealerWage - (s.helperTip || 0);
  return calc;
};

function resolveId(name, members) {
  const n = (name || "").trim().toLowerCase();
  for (const m of members) if (m.aliases.some(a => a.toLowerCase() === n)) return m.id;
  return name;
}
const getMember  = (n, members) => members.find(m => m.id === resolveId(n, members)) || null;
const dispName   = (n, members) => { const m = getMember(n, members); return m ? m.name : n; };
const bankOf     = (n, members) => { const m = getMember(n, members); return m ? (m.bank || "") : ""; };

// Greedy minimum-transfers settlement
function buildSettle(s, members, pairs) {
  const res = calcReserve(s);
  const dealerTips = s.players.filter(p => p.type === "dealer").reduce((a, p) => a + p.amount, 0);
  const dealerTotal = s.dealerWage + dealerTips;
  const helperTotal = s.helperTip || 0; // 管家小費
  const regular = s.players.filter(p => p.type !== "dealer");

  // 找出 Dealer 的 id (如果有的話)
  const dealerEntryEarly = s.players.find(p => p.type === "dealer");
  const dealerId = dealerEntryEarly ? resolveId(dealerEntryEarly.name, members) : null;
  const dealerName = dealerEntryEarly ? dealerEntryEarly.name : null;

  // 檢查 Dealer 是否在 pairs 中（要跟某玩家合併）
  let dealerMergedInto = null;
  if (dealerId) {
    for (const pair of pairs) {
      if (pair.includes(dealerId)) {
        dealerMergedInto = pair[0];
        break;
      }
    }
  }

  // 檢查管家是否在 pairs 中
  let helperMergedInto = null;
  for (const pair of pairs) {
    if (pair.includes("管家")) {
      helperMergedInto = pair[0];
      break;
    }
  }

  // Apply pairing: merge paired players
  const merged = {};
  for (const p of regular) {
    const pid = resolveId(p.name, members);
    let groupId = pid;
    let groupName = dispName(p.name, members);
    let groupBank = bankOf(pid, members);
    for (const pair of pairs) {
      if (pair.includes(pid)) {
        groupId = pair[0];
        groupName = pair.map(id => {
          if (id === "管家") return "管家";
          const m = members.find(x => x.id === id);
          return m ? m.name : id;
        }).join("+");
        groupBank = bankOf(pair[0], members);
        break;
      }
    }
    if (!merged[groupId]) merged[groupId] = { label: groupName, id: groupId, bank: groupBank, amount: 0 };
    merged[groupId].amount += p.amount;
  }

  // 如果 Dealer 在 pair 中，把 dealerTotal 併進該 pair
  if (dealerMergedInto !== null && dealerTotal !== 0) {
    if (!merged[dealerMergedInto]) {
      const dealerPair = pairs.find(p => p.includes(dealerId));
      const groupName = dealerPair.map(id => {
        if (id === "管家") return "管家";
        const m = members.find(x => x.id === id);
        return m ? m.name : id;
      }).join("+");
      const groupBank = bankOf(dealerPair[0], members);
      merged[dealerMergedInto] = { label: groupName, id: dealerMergedInto, bank: groupBank, amount: 0 };
    }
    merged[dealerMergedInto].amount += dealerTotal;
  }

  // 如果管家在 pair 中，把 helperTotal 併進該 pair
  if (helperMergedInto !== null && helperTotal !== 0) {
    if (!merged[helperMergedInto]) {
      const helperPair = pairs.find(p => p.includes("管家"));
      const groupName = helperPair.map(id => {
        if (id === "管家") return "管家";
        const m = members.find(x => x.id === id);
        return m ? m.name : id;
      }).join("+");
      const groupBank = bankOf(helperPair[0], members);
      merged[helperMergedInto] = { label: groupName, id: helperMergedInto, bank: groupBank, amount: 0 };
    }
    merged[helperMergedInto].amount += helperTotal;
  }

  const groups = Object.values(merged);
  const winners = groups.filter(g => g.amount > 0).sort((a, b) => b.amount - a.amount);
  const losers  = groups.filter(g => g.amount < 0).sort((a, b) => a.amount - b.amount);

  const pool = [];
  winners.forEach(g => pool.push({ label: g.label, id: g.id, bank: bankOf(g.id, members), amount: g.amount, splittable: false }));
  // Dealer 沒被併入 pair 時，獨立放進 pool
  if (dealerTotal > 0 && dealerMergedInto === null) {
    pool.push({ label: "Dealer " + dispName(dealerName, members), id: dealerId, bank: bankOf(dealerId, members), amount: dealerTotal, splittable: true });
  }
  // 管家沒被併入 pair 時，獨立放進 pool（沒銀行帳號）
  if (helperTotal > 0 && helperMergedInto === null) {
    pool.push({ label: "管家", id: "管家", bank: "", amount: helperTotal, splittable: true });
  }
  pool.push({ label: "場地", id: "場地", bank: bankOf("場地", members), amount: s.venueFee, splittable: false });
  if (res > 0) pool.push({ label: "公積金 (Joyce)", id: "Joyce", bank: bankOf("Joyce", members), amount: res, splittable: true });

  const negPool = losers.map(g => ({ label: g.label, id: g.id, amount: -g.amount }));
  if (res < 0) negPool.push({ label: "公積金補差", id: "Joyce", amount: -res });
  negPool.sort((a, b) => b.amount - a.amount);

  // Settlement order: bigger pools first (so losers fill them in one shot),
  // but Gary goes near the end (so he absorbs leftovers as the "split-friendly" winner),
  // and splittable items (公積金 Joyce) go last.
  const isGary = p => p.id === "Gary";
  const nonSplit = pool.filter(p => !p.splittable);
  const splittable = pool.filter(p => p.splittable);
  const nonGarySorted = nonSplit.filter(p => !isGary(p)).sort((a, b) => b.amount - a.amount);
  const garyItems = nonSplit.filter(isGary);
  const poolRem = [...nonGarySorted, ...garyItems, ...splittable].map(p => ({ ...p, rem: p.amount }));

  const paymentMap = {};

  // ──────────────────────────────────────────────
  // 子集合配對：用 bit-mask 嘗試所有非可拆贏家的子集合
  // 找出總和 = 輸家欠款 的最佳組合
  // 偏好：贏家數量越多越好（一次清理越多贏家）
  // ──────────────────────────────────────────────
  function findBestCombo(targetAmt, pool) {
    const candidates = pool.filter(it => !it.splittable && !isGary(it) && it.rem > 0);
    if (candidates.length === 0) return null;
    if (candidates.length > 18) {
      // 太多就退回 3 個的搜尋，避免太慢
      for (const a of candidates) if (a.rem === targetAmt) return { items: [a], count: 1 };
      for (let i = 0; i < candidates.length; i++)
        for (let j = i + 1; j < candidates.length; j++)
          if (candidates[i].rem + candidates[j].rem === targetAmt)
            return { items: [candidates[i], candidates[j]], count: 2 };
      for (let i = 0; i < candidates.length; i++)
        for (let j = i + 1; j < candidates.length; j++)
          for (let k = j + 1; k < candidates.length; k++)
            if (candidates[i].rem + candidates[j].rem + candidates[k].rem === targetAmt)
              return { items: [candidates[i], candidates[j], candidates[k]], count: 3 };
      return null;
    }

    let best = null;
    const N = candidates.length;
    for (let mask = 1; mask < (1 << N); mask++) {
      let sum = 0, count = 0;
      for (let i = 0; i < N; i++) {
        if (mask & (1 << i)) { sum += candidates[i].rem; count++; if (sum > targetAmt) break; }
      }
      if (sum !== targetAmt) continue;
      if (!best || count > best.count) {
        const items = [];
        for (let i = 0; i < N; i++) if (mask & (1 << i)) items.push(candidates[i]);
        best = { items: items, count: count };
      }
    }
    return best;
  }

  // ──────────────────────────────────────────────
  // Pass A：迭代式找最佳配對。
  // 每輪掃所有未完成輸家，挑「能配最多贏家」的那組先固定，
  // 然後重新計算剩下的可能性。
  // ──────────────────────────────────────────────
  while (true) {
    let bestPair = null;
    for (const loser of negPool) {
      if (loser._done) continue;
      const combo = findBestCombo(loser.amount, poolRem);
      if (!combo) continue;
      if (!bestPair || combo.count > bestPair.combo.count) {
        bestPair = { loser: loser, combo: combo };
      }
    }
    if (!bestPair) break;
    const pays = [];
    for (const item of bestPair.combo.items) {
      pays.push({ toLabel: item.label, toId: item.id, toBank: item.bank, amount: item.rem });
      item.rem = 0;
    }
    paymentMap[bestPair.loser.id + "||" + bestPair.loser.label] = { loserLabel: bestPair.loser.label, loserId: bestPair.loser.id, total: bestPair.loser.amount, pays };
    bestPair.loser._done = true;
  }

  // ──────────────────────────────────────────────
  // Pass B：剩下輸家用貪婪法 + Gary/公積金 吸收零頭
  // ──────────────────────────────────────────────
  const SMALL_LEFTOVER = 5000;
  for (const loser of negPool) {
    if (loser._done) continue;
    let rem = loser.amount;
    const pays = [];

    for (const item of poolRem) {
      if (rem <= 0) break;
      if (item.rem <= 0) continue;

      if (!item.splittable && !isGary(item)) {
        if (item.rem >= rem) {
          const leftoverIfTaken = item.rem - rem;
          if (leftoverIfTaken > 0 && leftoverIfTaken < SMALL_LEFTOVER) {
            const fallback = poolRem.find(it => (isGary(it) || it.splittable) && it.rem >= rem);
            if (fallback) continue;
          }
        }
        if (item.rem < rem) {
          const fallback = poolRem.find(it => (isGary(it) || it.splittable) && it.rem >= rem);
          if (fallback) continue;
        }
      }

      const take = Math.min(rem, item.rem);
      pays.push({ toLabel: item.label, toId: item.id, toBank: item.bank, amount: take });
      item.rem -= take;
      rem -= take;
    }
    paymentMap[loser.id + "||" + loser.label] = { loserLabel: loser.label, loserId: loser.id, total: loser.amount, pays };
  }
  return { pool, paymentMap, res, dealerTotal };
}

const C = {

const Tag = ({ children, color = C.blue }) => (
  <span style={{ fontSize: 10, padding: "1px 5px", borderRadius: 3, marginLeft: 4,
    background: color + "22", color, border: `1px solid ${color}44`, verticalAlign: "middle" }}>
    {children}
  </span>
);

const Btn = ({ children, onClick, variant = "primary", disabled = false, style: extra = {} }) => {
  const base = { cursor: disabled ? "not-allowed" : "pointer", borderRadius: 4, fontFamily: "inherit", fontSize: 13,
    padding: "7px 18px", transition: "all .18s", border: "none", opacity: disabled ? 0.5 : 1 };
  const variants = {
    primary:   { background: C.gold, color: "#0a0c10", fontWeight: 700 },
    secondary: { background: "transparent", color: C.dim, border: `1px solid ${C.border}` },
    ghost:     { background: "transparent", color: C.dim, border: `1px dashed ${C.border}`, padding: "4px 10px", fontSize: 12 },
    danger:    { background: "transparent", color: C.red, border: `1px solid ${C.red}44` },
    accent:    { background: C.accent, color: "#fff", fontWeight: 700 },
    dark:      { background: C.surface2, color: C.dim, border: `1px solid ${C.border}` },
  };
  return <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{ ...base, ...variants[variant], ...extra }}>{children}</button>;
};

const Input = ({ label, ...props }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 11, color: C.dim, letterSpacing: "0.04em" }}>{label}</label>}
    <input {...props} style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text,
      padding: "7px 10px", borderRadius: 4, fontFamily: "monospace", fontSize: 13, outline: "none",
      width: "100%", boxSizing: "border-box", ...(props.style || {}) }} />
  </div>
);

const Select = ({ label, children, ...props }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 11, color: C.dim, letterSpacing: "0.04em" }}>{label}</label>}
    <select {...props} style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text,
      padding: "7px 10px", borderRadius: 4, fontFamily: "inherit", fontSize: 13, outline: "none", width: "100%", boxSizing: "border-box" }}>
      {children}

);

const Modal = ({ open, title, onClose, onSave, children }) => {
  if (!open) return null;
  return (
    <div onClick={e => e.target === e.currentTarget && onClose()}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.8)", zIndex: 300,
        display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ background: C.surface, border: `1px solid ${C.gold}`, borderRadius: 8,
        padding: 24, width: "100%", maxWidth: 440, maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ color: C.goldLight, fontWeight: 700, fontSize: 15, marginBottom: 16 }}>{title}</div>
        {children}
        <div style={{ display: "flex", gap: 8, marginTop: 16, justifyContent: "flex-end" }}>
          <Btn variant="secondary" onClick={onClose}>取消</Btn>
          {onSave && <Btn onClick={onSave}>儲存</Btn>}
        </div>
      </div>
    </div>
  );
};

const Divider = () => <div style={{ height: 1, background: C.border, margin: "8px 0" }} />;

  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 12 }}>

);

// TAB: RECORDS
// ═══════════════════════════════════════════════════════
function TabRecords({ data, setData, onEdit }) {
  const dialog = useDialog();
  const { sessions, members } = data;
  if (!sessions.length) return <div style={{ textAlign: "center", padding: 60, color: C.muted }}>尚無場次記錄</div>;

  const deleteSession = async (id) => {
    if (!(await dialog.confirm("確定刪除此場次？"))) return;
    setData(d => ({ ...d, sessions: d.sessions.filter(s => s.id !== id) }));
  };

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(300px,1fr))", gap: 14 }}>
      {[...sessions].reverse().map(s => {
        const res = calcReserve(s);
        const dealer = s.players.find(p => p.type === "dealer");
        const regular = s.players.filter(p => p.type !== "dealer");
        // 未結算 = 沒勾選 settled
        const inProgress = !s.settled;
        const editTimeStr = s.lastEditTs ? new Date(s.lastEditTs).toLocaleString("zh-TW", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "";
        return (
          <div key={s.id} style={{ background: C.surface, border: `1px solid ${inProgress ? C.red+"66" : C.border}`, borderRadius: 8, overflow: "hidden" }}>
            <div style={{ background: C.surface2, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${C.border}` }}>
              <span style={{ fontFamily: "monospace", color: C.goldLight, fontWeight: 700, fontSize: 14 }}>
                {s.date}
                {inProgress && <span style={{ marginLeft: 6, fontSize: 10, padding: "1px 6px", borderRadius: 3, background: C.red+"22", color: C.red, border: `1px solid ${C.red}44`, fontWeight: 600 }}>未結算</span>}
              </span>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <span style={{ fontFamily: "monospace", color: C.dim, fontSize: 11 }}>{s.hours || "?"}hr</span>
                <button onClick={() => onEdit(s.id)} title="編輯"
                  style={{ background: "transparent", border: `1px solid ${C.border}`, color: C.dim, borderRadius: 3, cursor: "pointer", fontSize: 10, padding: "2px 6px" }}>✎</button>
                <button onClick={() => deleteSession(s.id)} title="刪除"
                  style={{ background: "transparent", border: `1px solid ${C.border}`, color: C.muted, borderRadius: 3, cursor: "pointer", fontSize: 10, padding: "2px 6px" }}>🗑</button>
              </div>
            </div>
            {(s.lastEditor || editTimeStr) && (
              <div style={{ padding: "4px 14px", fontSize: 10, color: C.muted, fontFamily: "monospace", borderBottom: `1px solid ${C.border}`, background: C.bg }}>
                ✎ {s.lastEditor || "?"} 編輯於 {editTimeStr || "?"}
              </div>
            )}
            <div style={{ padding: "12px 14px" }}>
              <FR label="水錢收入" value={fmtAbs(s.totalWater)} />
              <FR label="場地費" value={`-${fmtAbs(s.venueFee)}`} valueColor={C.red} />
              <FR label="Dealer薪" value={`-${fmtAbs(s.dealerWage)}`} valueColor={C.red} />
              {s.helperTip > 0 && <FR label="管家小費" value={`-${fmtAbs(s.helperTip)}`} valueColor={C.red} />}
              {s.mealFee > 0 && <div style={{ fontSize: 11, marginBottom: 3 }}>
                <span style={{ background: C.blue+"1a", color: C.blue, border:`1px solid ${C.blue}33`, padding:"1px 6px", borderRadius:3, marginRight:4 }}>餐費 {fmtAbs(s.mealFee)}</span>
              </div>}
              {s.jackpot > 0 && <div style={{ fontSize: 11, marginBottom: 3 }}>
                <span style={{ background: C.gold+"1a", color: C.gold, border:`1px solid ${C.gold}33`, padding:"1px 6px", borderRadius:3 }}>Jackpot {fmtAbs(s.jackpot)}</span>
              </div>}
              <Divider />
              <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 13, marginBottom: 4 }}>
                <span>水錢餘</span>
                <span style={{ fontFamily: "monospace", color: res >= 0 ? C.gold : C.red }}>{fmt(res)}</span>
              </div>
              {dealer && <FR label={dealer.name} value={fmt(dealer.amount)} valueColor={dealer.amount >= 0 ? C.accent : C.red} />}
              <Divider />
              {regular.map((p, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", borderBottom: `1px solid ${C.border}44`, fontSize: 12 }}>
                  <span>{dispName(p.name, members)}<Tag color={p.type === "member" ? C.blue : C.accent}>{p.type === "member" ? "成員" : "來賓"}</Tag></span>
                  <span style={{ fontFamily: "monospace", fontWeight: 600, color: p.amount >= 0 ? C.green : C.red }}>{fmt(p.amount)}</span>
                </div>
              ))}
              {(s.bonusEvents || []).length > 0 && <>
                <Divider />
                <div style={{ fontSize: 11, color: C.dim, marginBottom: 4 }}>特殊牌</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                  {s.bonusEvents.map((b, i) => (
                    <span key={i} style={{ fontSize: 11, padding: "2px 7px", borderRadius: 10, fontFamily: "monospace",
                      background: b.type === "monster" ? "#e0555522" : C.gold+"22",
                      color: b.type === "monster" ? "#f87171" : C.goldLight,
                      border: `1px solid ${b.type === "monster" ? "#e0555544" : C.gold+"44"}` }}>
                      {b.type === "monster" ? "🐲" : "👑"} {dispName(b.winner, members)} +{fmtAbs(b.amount)}
                    </span>
                  ))}
                </div>
              </>}
              {s.note && <div style={{ marginTop: 8, fontSize: 11, color: C.dim }}>📝 {s.note}</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// TAB: NEW SESSION
// ═══════════════════════════════════════════════════════
function TabNew({ data, setData, editingId, clearEditing }) {
  const { members } = data;
  const EMPTY_FORM = { date: "", hours: "", totalWater: "", venueFee: "", dealerWage: "", helperTip: "", mealFee: "", jackpot: "", note: "" };
  const [form, setForm] = useState(EMPTY_FORM);
  const [dealerTip, setDealerTip] = useState({ memberId: "", amount: "" });
  const [players, setPlayers] = useState([{ memberId: "", sign: "win", absAmt: "" }]);
  const [bonuses, setBonuses] = useState([]);
  const [settled, setSettled] = useState(false);
  const [saved, setSaved] = useState(false);

  // ──── 編輯中狀態追蹤（心跳機制） ────
  // 每30秒寫一次心跳到 Firebase，其他人能看到「Joyce 正在編輯」
  const currentUser = (typeof window !== "undefined" && window.__currentUser) || "";

  useEffect(() => {
    if (!editingId || !currentUser) return;

    const markEditing = () => {
      setData(d => {
        const editing = Object.assign({}, d.editing || {});
        editing[editingId] = { editor: currentUser, ts: Date.now() };
        return Object.assign({}, d, { editing: editing });
      });
    };

    markEditing();
    const interval = setInterval(markEditing, 30000);

    return () => {
      clearInterval(interval);
      setData(d => {
        const editing = Object.assign({}, d.editing || {});
        if (editing[editingId] && editing[editingId].editor === currentUser) {
          delete editing[editingId];
        }
        return Object.assign({}, d, { editing: editing });
      });
    };
  }, [editingId, currentUser]);

  // 檢查是否有別人正在編輯這一場（5 分鐘內活動）
  const otherEditor = editingId && data.editing && data.editing[editingId]
    && data.editing[editingId].editor !== currentUser
    && (Date.now() - data.editing[editingId].ts) < 5 * 60 * 1000
    ? data.editing[editingId]
    : null;

  // Load session for editing
  useEffect(() => {
    if (!editingId) return;
    const s = data.sessions.find(x => x.id === editingId);
    if (!s) return;
    setForm({
      date: s.date, hours: String(s.hours), totalWater: String(s.totalWater),
      venueFee: String(s.venueFee), dealerWage: String(s.dealerWage),
      helperTip: String(s.helperTip || 0),
      mealFee: String(s.mealFee || 0), jackpot: String(s.jackpot || 0),
      note: s.note || "",
    });
    const dealerEntry = s.players.find(p => p.type === "dealer");
    if (dealerEntry) {
      const dm = members.find(m => m.aliases.some(a => a.toLowerCase() === dealerEntry.name.toLowerCase()) || m.name === dealerEntry.name);
      setDealerTip({ memberId: dm ? dm.id : "", amount: String(dealerEntry.amount) });
    } else {
      setDealerTip({ memberId: "", amount: "" });
    }
    const regular = s.players.filter(p => p.type !== "dealer");
    if (regular.length) {
      setPlayers(regular.map(p => {
        const m = members.find(x => x.aliases.some(a => a.toLowerCase() === p.name.toLowerCase()) || x.name === p.name);
        return {
          memberId: m ? m.id : "",
          sign: p.amount >= 0 ? "win" : "lose",
          absAmt: String(Math.abs(p.amount)),
        };
      }));
    } else {
      setPlayers([{ memberId: "", sign: "win", absAmt: "" }]);
    }
    setBonuses(s.bonusEvents || []);
    setSettled(!!s.settled);
  }, [editingId]);

  const fv = k => parseInt(form[k]) || 0;
  const reserve = fv("totalWater") - fv("venueFee") - fv("dealerWage") - fv("helperTip");
  const tipNum = parseInt(dealerTip.amount) || 0;
  const signedAmt = p => (p.sign === "win" ? 1 : -1) * (parseInt(p.absAmt) || 0);
  const playerSum = players.reduce((a, p) => a + signedAmt(p), 0);
  const totalCheck = fv("totalWater") + tipNum + playerSum;
  const isBalanced = totalCheck === 0;

  const playableMembers = members.filter(m => m.type !== "venue" && m.type !== "dealer");
  const dealerMembers = members.filter(m => m.type === "dealer");

  const updatePlayer = (i, patch) => setPlayers(ps => { const ns = [...ps]; ns[i] = { ...ns[i], ...patch }; return ns; });
  const addPlayerRow = () => setPlayers(ps => [...ps, { memberId: "", sign: "win", absAmt: "" }]);
  const removePlayerRow = i => setPlayers(ps => ps.filter((_, j) => j !== i));

  const clearAll = () => {
    setForm(EMPTY_FORM);
    setDealerTip({ memberId: "", amount: "" });
    setPlayers([{ memberId: "", sign: "win", absAmt: "" }]);
    setBonuses([]);
    setSettled(false);
    setSaved(false);
    if (clearEditing) clearEditing();
  };

  const dialog = useDialog();
  const save = async () => {
    if (!form.date) { await dialog.alert("請至少填入日期"); return; }
    const dealerMember = members.find(m => m.id === dealerTip.memberId);
    const dealerEntry = tipNum !== 0 && dealerMember
      ? [{ name: dealerMember.name, amount: tipNum, type: "dealer" }] : [];
    const filledPlayers = players.filter(p => p.memberId).map(p => {
      const m = members.find(x => x.id === p.memberId);
      return { name: m ? m.name : p.memberId, amount: signedAmt(p), type: m ? m.type : "member" };
    });
    const editor = (typeof window !== "undefined" && window.__currentUser) || "";
    const sessionData = {
      id: editingId || "s" + Date.now(), ...form,
      hours: parseFloat(form.hours) || 0, totalWater: fv("totalWater"),
      venueFee: fv("venueFee"), dealerWage: fv("dealerWage"),
      helperTip: fv("helperTip"),
      mealFee: fv("mealFee"), jackpot: fv("jackpot"),
      reserveOverride: reserve,
      players: [...dealerEntry, ...filledPlayers],
      bonusEvents: bonuses.filter(b => b.winner),
      settled: settled,
      lastEditor: editor,
      lastEditTs: Date.now(),
    };
    const newSessions = editingId
      ? data.sessions.map(s => s.id === editingId ? sessionData : s).sort((a, b) => a.date < b.date ? -1 : 1)
      : [...data.sessions, sessionData].sort((a, b) => a.date < b.date ? -1 : 1);
    setData(d => {
      const editing = { ...(d.editing || {}) };
      if (editingId && editing[editingId]) delete editing[editingId];
      return { ...d, sessions: newSessions, editing };
    });
    clearAll();
    setSaved(true); setTimeout(() => setSaved(false), 2500);
  };

  const sel = (extra={}) => ({ background: C.surface2, border: `1px solid ${C.border}`, color: C.text,
    padding: "6px 8px", borderRadius: 4, fontFamily: "inherit", fontSize: 13, outline: "none", width: "100%", ...extra });

  const filledForBonus = players.filter(p => p.memberId).map(p => {
    const m = members.find(x => x.id === p.memberId);
    return m ? m.name : p.memberId;
  });

  return (
    <div style={{ maxWidth: 720 }}>
      {saved && (
        <div style={{ background: C.green+"22", border: `1px solid ${C.green}44`, color: C.green,
          padding: "8px 14px", borderRadius: 4, marginBottom: 14, fontSize: 13 }}>✅ 場次已儲存！</div>
      )}
      {editingId && (() => {
        const editingSession = data.sessions.find(s => s.id === editingId);
        const lastEditorStr = editingSession && editingSession.lastEditor ? editingSession.lastEditor : "";
        const lastEditTimeStr = editingSession && editingSession.lastEditTs
          ? new Date(editingSession.lastEditTs).toLocaleString("zh-TW", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})
          : "";
        return (
          <div style={{ background: C.gold+"22", border: `1px solid ${C.gold}66`, color: C.goldLight,
            padding: "10px 14px", borderRadius: 4, marginBottom: 14, fontSize: 13,
            display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <div>
              <div>✎ 編輯中：{form.date || editingId}</div>
              {lastEditorStr && (
                <div style={{ fontSize: 11, color: C.dim, fontFamily: "monospace", marginTop: 3 }}>
                  上次：{lastEditorStr} {lastEditTimeStr && `· ${lastEditTimeStr}`}
                </div>
              )}
            </div>
            <button onClick={clearAll} style={{ background: "transparent", border: `1px solid ${C.gold}66`,
              color: C.goldLight, padding: "3px 10px", borderRadius: 3, cursor: "pointer", fontSize: 11, fontFamily: "inherit" }}>取消編輯</button>
          </div>
        );
      })()}
      {otherEditor && (
        <div style={{ background: C.red+"22", border: `2px solid ${C.red}`, color: C.red,
          padding: "12px 14px", borderRadius: 4, marginBottom: 14, fontSize: 13 }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>
            ⚠️ {otherEditor.editor} 正在編輯這一場
          </div>
          <div style={{ fontSize: 11, fontFamily: "monospace", opacity: 0.85 }}>
            最後活動：{Math.max(1, Math.floor((Date.now() - otherEditor.ts) / 60000))} 分鐘前　·　如果你也儲存會覆蓋對方的編輯
          </div>
        </div>
      )}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 20 }}>

        {/* 基本資訊 */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Input label="📅 日期" type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          <Input label="⏱ 時數" type="number" step="0.5" placeholder="e.g. 6.5" value={form.hours} onChange={e => setForm(f => ({ ...f, hours: e.target.value }))} />
          <Input label="💰 水錢收入" type="number" placeholder="e.g. 32100" value={form.totalWater} onChange={e => setForm(f => ({ ...f, totalWater: e.target.value }))} />
          <Input label="🏠 場地費" type="number" value={form.venueFee} onChange={e => setForm(f => ({ ...f, venueFee: e.target.value }))} />
          <Input label="👔 Dealer薪資" type="number" value={form.dealerWage} onChange={e => setForm(f => ({ ...f, dealerWage: e.target.value }))} />
          <Input label="🧑‍🎓 管家小費" type="number" placeholder="現金支出" value={form.helperTip} onChange={e => setForm(f => ({ ...f, helperTip: e.target.value }))} />
          <Input label="📝 備註" value={form.note} onChange={e => setForm(f => ({ ...f, note: e.target.value }))} placeholder="自由填寫" />
          <Input label="🍱 餐費（純記錄）" type="number" value={form.mealFee} onChange={e => setForm(f => ({ ...f, mealFee: e.target.value }))} />
          <Input label="🎰 Jackpot（純記錄）" type="number" value={form.jackpot} onChange={e => setForm(f => ({ ...f, jackpot: e.target.value }))} />
        </div>
        <div style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 4,
          padding: "7px 12px", display: "flex", justifyContent: "space-between", marginTop: 10, fontSize: 12 }}>
          <span style={{ color: C.dim }}>水錢餘 = {fmtAbs(fv("totalWater"))} − {fmtAbs(fv("venueFee"))} − {fmtAbs(fv("dealerWage"))} − {fmtAbs(fv("helperTip"))}</span>
          <span style={{ fontFamily: "monospace", fontWeight: 700, color: reserve >= 0 ? C.green : C.red }}>{fmt(reserve)}</span>
        </div>

        {/* Dealer 小費 */}
        <div style={{ marginTop: 18 }}>
          <SectionHeader>Dealer 小費</SectionHeader>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              <label style={{ fontSize: 11, color: C.dim }}>Dealer 姓名</label>
              <select value={dealerTip.memberId} onChange={e => setDealerTip(t => ({ ...t, memberId: e.target.value }))} style={sel()}>
                <option value="">-- 選擇 Dealer --</option>
                {dealerMembers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
            </div>
            <Input label="小費金額" type="number" placeholder="e.g. 13000" value={dealerTip.amount}
              onChange={e => setDealerTip(t => ({ ...t, amount: e.target.value }))}
              style={{ borderColor: dealerTip.amount ? C.gold+"66" : C.border, color: C.gold }} />
          </div>
        </div>

        {/* 玩家輸贏 */}
        <div style={{ marginTop: 18 }}>
          <SectionHeader>玩家輸贏</SectionHeader>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 90px 120px 28px", gap: 6, marginBottom: 6 }}>
            {["玩家", "贏／輸", "金額", ""].map((h, i) => (
              <span key={i} style={{ fontSize: 11, color: C.dim }}>{h}</span>
            ))}
          </div>
          {players.map((p, i) => {
            const isWin = p.sign === "win";
            return (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 90px 120px 28px", gap: 6, marginBottom: 7, alignItems: "center" }}>
                {/* 玩家下拉 — 過濾掉已選的玩家（保留當前列） */}
                <select value={p.memberId} onChange={e => updatePlayer(i, { memberId: e.target.value })} style={sel()}>
                  <option value="">-- 選玩家 --</option>
                  {playableMembers
                    .filter(m => m.id === p.memberId || !players.some(pp => pp.memberId === m.id))
                    .map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
                {/* 贏/輸下拉 */}
                <select value={p.sign} onChange={e => updatePlayer(i, { sign: e.target.value })} style={sel({
                  background: isWin ? C.green+"22" : C.red+"22",
                  border: `1px solid ${isWin ? C.green+"66" : C.red+"66"}`,
                  color: isWin ? C.green : C.red,
                  fontWeight: 700,
                })}>
                  <option value="win">贏</option>
                  <option value="lose">輸</option>
                </select>
                {/* 金額 */}
                <input type="number" placeholder="金額" value={p.absAmt}
                  onChange={e => updatePlayer(i, { absAmt: e.target.value })}
                  style={{ background: C.surface2, border: `1px solid ${p.absAmt ? (isWin ? C.green+"66" : C.red+"66") : C.border}`,
                    color: isWin ? C.green : C.red, padding: "6px 8px", borderRadius: 4,
                    fontFamily: "monospace", fontSize: 13, outline: "none", width: "100%", fontWeight: 600 }} />
                {/* 刪除 */}
                <button onClick={() => removePlayerRow(i)}
                  style={{ background: "transparent", border: "none", color: C.muted, cursor: "pointer", fontSize: 14 }}>✕</button>
              </div>
            );
          })}
          <button onClick={addPlayerRow} style={{ background: "transparent", border: `1px dashed ${C.border}`,
            color: C.dim, borderRadius: 4, cursor: "pointer", fontSize: 12, padding: "5px", width: "100%",
            marginTop: 3, fontFamily: "inherit" }}>＋ 新增玩家</button>
        </div>

        {/* 驗證加總 */}
        {(players.some(p => p.memberId) || tipNum !== 0) && (
          <div style={{ background: C.surface2, border: `1px solid ${isBalanced ? C.green+"55" : C.red+"33"}`,
            borderRadius: 4, padding: "8px 12px", marginTop: 10, fontSize: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
              <span style={{ color: C.dim }}>水錢收入</span>
              <span style={{ fontFamily: "monospace", color: C.gold }}>+{fmtAbs(fv("totalWater"))}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
              <span style={{ color: C.dim }}>Dealer 小費</span>
              <span style={{ fontFamily: "monospace", color: C.gold }}>+{fmtAbs(tipNum)}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
              <span style={{ color: C.dim }}>玩家總和</span>
              <span style={{ fontFamily: "monospace", color: playerSum >= 0 ? C.green : C.red }}>{fmt(playerSum)}</span>
            </div>
            <div style={{ height: 1, background: C.border, margin: "5px 0" }} />
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontWeight: 600 }}>合計</span>
              <span style={{ fontFamily: "monospace", fontWeight: 700,
                color: isBalanced ? C.green : C.red }}>{fmt(totalCheck)} {isBalanced ? "✓ 平衡" : "✗ 未平衡"}</span>
            </div>
          </div>
        )}

        {/* 特殊牌 */}
        <div style={{ marginTop: 18 }}>
          <SectionHeader>特殊牌（純記錄）</SectionHeader>
          {bonuses.map((b, i) => (
            <div key={i} style={{ display: "grid", gridTemplateColumns: "130px 1fr 90px 28px", gap: 5, marginBottom: 5, alignItems: "center" }}>
              <select value={b.type} onChange={e => { const bs=[...bonuses]; bs[i]={...b,type:e.target.value}; setBonuses(bs); }} style={sel()}>
                <option value="monster">🐲 怪物</option>
                <option value="highhand">👑 High Hand</option>
              </select>
              <select value={b.winner} onChange={e => { const bs=[...bonuses]; bs[i]={...b,winner:e.target.value}; setBonuses(bs); }} style={sel()}>
                <option value="">-- 得獎者 --</option>
                {filledForBonus.map((name, j) => <option key={j} value={name}>{name}</option>)}
              </select>
              <input type="number" value={b.amount}
                onChange={e => { const bs=[...bonuses]; bs[i]={...b,amount:parseInt(e.target.value)||0}; setBonuses(bs); }}
                placeholder="金額" style={{ ...sel(), fontFamily: "monospace" }} />
              <button onClick={() => setBonuses(bs => bs.filter((_,j)=>j!==i))}
                style={{ background:"transparent", border:"none", color:C.muted, cursor:"pointer", fontSize:13 }}>✕</button>
            </div>
          ))}
          <button onClick={() => setBonuses(bs => [...bs, { type:"monster", winner:"", amount:3000 }])}
            style={{ background:"transparent", border:`1px dashed ${C.border}`, color:C.dim, borderRadius:4,
              cursor:"pointer", fontSize:12, padding:"5px", width:"100%", marginTop:3, fontFamily:"inherit" }}>＋ 新增特殊牌</button>
        </div>

        {/* 結算狀態 */}
        <div style={{ marginTop: 18, padding: "10px 14px", background: settled ? C.green+"15" : C.surface2,
          border: `1px solid ${settled ? C.green+"55" : C.border}`, borderRadius: 6,
          display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}
          onClick={() => setSettled(s => !s)}>
          <div style={{ width: 22, height: 22, borderRadius: 4,
            border: `2px solid ${settled ? C.green : C.dim}`,
            background: settled ? C.green : "transparent",
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "#0a0c10", fontWeight: 900, fontSize: 14 }}>{settled ? "✓" : ""}</div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: settled ? C.green : C.text }}>結算完成</div>
            <div style={{ fontSize: 11, color: C.dim, marginTop: 1 }}>
              {settled ? "此場次已收尾，不會顯示為進行中" : "勾選後標記此場次已收尾"}
            </div>
          </div>
        </div>

        <div style={{ marginTop: 16, display: "flex", gap: 8 }}>
          <Btn onClick={save}>{editingId ? "更新場次" : "儲存場次"}</Btn>
          <Btn variant="secondary" onClick={clearAll}>清除</Btn>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// TAB: SETTLEMENT
// ═══════════════════════════════════════════════════════
function TabSettle({ data, setData }) {
  const dialog = useDialog();
  const { sessions, members } = data;
  const [selId, setSelId] = useState("");
  const [pairs, setPairs] = useState([]); // [[id1,id2],...]
  const [newPair, setNewPair] = useState(["", ""]);
  const [copied, setCopied] = useState("");
  const [editMode, setEditMode] = useState(false);
  const [editedMap, setEditedMap] = useState(null); // { loserKey: { ...entry, pays: [...] } }
  const [saveMsg, setSaveMsg] = useState("");

  const s = sessions.find(x => x.id === selId);
  const autoResult = s ? buildSettle(s, members, pairs) : { pool: [], paymentMap: {}, res: 0, dealerTotal: 0 };
  const { pool, res, dealerTotal } = autoResult;

  // Decide what paymentMap to show: custom saved → custom; in edit mode → edited; else → auto
  const customMap = s && s.customSettlement && s.customSettlement.paymentMap ? s.customSettlement.paymentMap : null;
  const displayMap = editMode && editedMap
    ? editedMap
    : (customMap || autoResult.paymentMap);

  // Reset edit state when switching sessions
  useEffect(() => {
    setEditMode(false);
    setEditedMap(null);
    setSaveMsg("");
  }, [selId]);

  const sessionPlayers = s ? (() => {
    const list = [...new Set(s.players.map(p => resolveId(p.name, members)))];
    // 如果這場有管家小費，加入「管家」選項
    if ((s.helperTip || 0) > 0) list.push("管家");
    return list;
  })() : [];

  const copyBill = (entry) => {
    const lines = [`${s.date} 結算帳單`, ""];
    entry.pays.forEach(p => {
      lines.push(`${p.toLabel} +${fmtAbs(p.amount)}`);
      if (p.toBank) lines.push(p.toBank);
      lines.push("");
    });
    lines.push(`合計：-${fmtAbs(entry.total)}`);
    const text = lines.join("\n");
    if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => { setCopied(entry.loserLabel); setTimeout(() => setCopied(""), 2000); });
  };

  const startEdit = () => {
    // Deep copy current displayed map for editing
    const copy = {};
    Object.entries(displayMap).forEach(([key, entry]) => {
      copy[key] = Object.assign({}, entry, { pays: entry.pays.map(p => Object.assign({}, p)) });
    });
    setEditedMap(copy);
    setEditMode(true);
  };

  const cancelEdit = () => {
    setEditMode(false);
    setEditedMap(null);
  };

  const updatePayAmount = (loserKey, payIdx, newAmount) => {
    // 允許空字串（讓使用者可以清空輸入框），只接受數字
    const clean = newAmount === "" ? "" : (newAmount.replace(/[^0-9]/g, ""));
    setEditedMap(m => {
      const next = Object.assign({}, m);
      const entry = Object.assign({}, next[loserKey]);
      entry.pays = entry.pays.map((p, i) => i === payIdx ? Object.assign({}, p, { amount: clean }) : p);
      next[loserKey] = entry;
      return next;
    });
  };

  // 新增一筆轉帳到某輸家
  const addPay = (loserKey, toId) => {
    if (!toId) return;
    const poolItem = pool.find(p => p.id === toId);
    if (!poolItem) return;
    setEditedMap(m => {
      const next = Object.assign({}, m);
      const entry = Object.assign({}, next[loserKey]);
      // 已經存在則不重複加
      if (entry.pays.some(p => p.toId === toId)) return m;
      entry.pays = [...entry.pays, { toLabel: poolItem.label, toId: poolItem.id, toBank: poolItem.bank, amount: "" }];
      next[loserKey] = entry;
      return next;
    });
  };

  // 刪除某筆轉帳
  const removePay = (loserKey, payIdx) => {
    setEditedMap(m => {
      const next = Object.assign({}, m);
      const entry = Object.assign({}, next[loserKey]);
      entry.pays = entry.pays.filter((_, i) => i !== payIdx);
      next[loserKey] = entry;
      return next;
    });
  };

  const saveCustom = async () => {
    // 驗證1：每個輸家的 pays 總額 = 該輸家欠款
    const loserErrors = [];
    Object.values(editedMap).forEach(entry => {
      const sum = entry.pays.reduce((a, p) => a + (parseInt(p.amount) || 0), 0);
      if (sum !== entry.total) {
        loserErrors.push(`輸家 ${entry.loserLabel}：應付 ${entry.total}，目前 ${sum}（差 ${entry.total - sum}）`);
      }
    });

    // 驗證2：每個贏家收到總額 = 該贏家應得（從 pool）
    // 統計所有 pays 中每個 toId 的總收款
    const winnerReceived = {};
    Object.values(editedMap).forEach(entry => {
      entry.pays.forEach(p => {
        const amt = parseInt(p.amount) || 0;
        if (!winnerReceived[p.toId]) winnerReceived[p.toId] = { label: p.toLabel, sum: 0 };
        winnerReceived[p.toId].sum += amt;
      });
    });
    const winnerErrors = [];
    pool.forEach(p => {
      const recv = winnerReceived[p.id] ? winnerReceived[p.id].sum : 0;
      if (recv !== p.amount) {
        winnerErrors.push(`贏家 ${p.label}：應收 ${p.amount}，目前 ${recv}（差 ${p.amount - recv}）`);
      }
    });
    // 也檢查公積金補差（res < 0 時是輸家）— 已含在 editedMap 裡
    // 但要檢查 winnerReceived 中沒有不該收的人
    Object.entries(winnerReceived).forEach(([id, info]) => {
      const poolMatch = pool.find(p => p.id === id);
      if (!poolMatch) {
        // 可能是公積金補差(res < 0)，這是負池子，跳過
        if (id === "Joyce" && res < 0) return;
        winnerErrors.push(`贏家 ${info.label}：不在本場收款方名單`);
      }
    });

    if (loserErrors.length + winnerErrors.length > 0) {
      const msg = [];
      if (loserErrors.length) msg.push("【輸家端】\n" + loserErrors.join("\n"));
      if (winnerErrors.length) msg.push("【贏家端】\n" + winnerErrors.join("\n"));
      await dialog.alert("數字不平衡，無法儲存：\n\n" + msg.join("\n\n"));
      return;
    }

    // Save into session — 把空字串/字串數字統一轉成數字
    const editor = (typeof window !== "undefined" && window.__currentUser) || "";
    const normalizedMap = {};
    Object.entries(editedMap).forEach(([key, entry]) => {
      normalizedMap[key] = Object.assign({}, entry, {
        pays: entry.pays.map(p => Object.assign({}, p, { amount: parseInt(p.amount) || 0 }))
      });
    });
    setData(d => {
      const newSessions = d.sessions.map(sess => {
        if (sess.id !== selId) return sess;
        return Object.assign({}, sess, {
          customSettlement: {
            paymentMap: normalizedMap,
            editor: editor,
            editTs: Date.now(),
            pairs: pairs,
          }
        });
      });
      return Object.assign({}, d, { sessions: newSessions });
    });
    setEditMode(false);
    setSaveMsg("✅ 已儲存");
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const resetToAuto = async () => {
    if (!(await dialog.confirm("確定要清除手動結算，回到自動計算結果？"))) return;
    setData(d => {
      const newSessions = d.sessions.map(sess => {
        if (sess.id !== selId) return sess;
        const cp = Object.assign({}, sess);
        delete cp.customSettlement;
        return cp;
      });
      return Object.assign({}, d, { sessions: newSessions });
    });
    setEditMode(false);
    setEditedMap(null);
    setSaveMsg("🔄 已回到自動計算");
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const customEditTimeStr = customMap && s.customSettlement.editTs
    ? new Date(s.customSettlement.editTs).toLocaleString("zh-TW", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})
    : "";

  return (
    <div>
      <div style={{ marginBottom: 16 }}>
        <select value={selId} onChange={e => { setSelId(e.target.value); setPairs([]); }}
          style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text, padding: "7px 12px", borderRadius: 4, fontSize: 13, outline: "none", maxWidth: 260 }}>
          <option value="">-- 選擇場次 --</option>
          {[...sessions].reverse().map(s => <option key={s.id} value={s.id}>{s.date} ({s.hours}hr){s.customSettlement ? " ✏️" : ""}</option>)}
        </select>
      </div>

      {s && <>
        {/* 手動結算狀態提示 */}
        {customMap && !editMode && (
          <div style={{ background: C.gold+"15", border: `1px solid ${C.gold}55`, borderRadius: 6,
            padding: "10px 14px", marginBottom: 14, display: "flex", justifyContent: "space-between",
            alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <div style={{ fontSize: 12, color: C.goldLight }}>
              ✏️ 此結算已由 <b>{s.customSettlement.editor || "?"}</b> 手動調整
              {customEditTimeStr && <span style={{ color: C.dim, marginLeft: 6 }}>· {customEditTimeStr}</span>}
            </div>
            <button onClick={resetToAuto}
              style={{ background: "transparent", border: `1px solid ${C.gold}66`, color: C.goldLight,
                padding: "3px 10px", borderRadius: 3, cursor: "pointer", fontSize: 11, fontFamily: "inherit" }}>🔄 重新計算</button>
          </div>
        )}

        {/* Pairing UI - 編輯模式下隱藏 */}
        {!editMode && (
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 16, marginBottom: 16, maxWidth: 500 }}>
            <SectionHeader>共算配對（選填）</SectionHeader>
            {pairs.map((pair, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, fontSize: 13 }}>
                <span style={{ background: C.surface2, border: `1px solid ${C.border}`, padding: "4px 10px", borderRadius: 4, color: C.text }}>
                  {pair.map(id => members.find(m => m.id === id)?.name || id).join(" + ")}
                </span>
                <button onClick={() => setPairs(ps => ps.filter((_, j) => j !== i))}
                  style={{ background: "transparent", border: "none", color: C.red, cursor: "pointer", fontSize: 13 }}>✕</button>
              </div>
            ))}
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <select value={newPair[0]} onChange={e => setNewPair(p => [e.target.value, p[1]])}
                style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text, padding: "6px 9px", borderRadius: 4, fontSize: 12, outline: "none" }}>
                <option value="">玩家 A</option>
                {sessionPlayers.map(id => <option key={id} value={id}>{members.find(m => m.id === id)?.name || id}</option>)}
              </select>
              <span style={{ color: C.dim }}>＋</span>
              <select value={newPair[1]} onChange={e => setNewPair(p => [p[0], e.target.value])}
                style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text, padding: "6px 9px", borderRadius: 4, fontSize: 12, outline: "none" }}>
                <option value="">玩家 B</option>
                {sessionPlayers.map(id => <option key={id} value={id}>{members.find(m => m.id === id)?.name || id}</option>)}
              </select>
              <Btn variant="dark" onClick={() => {
                if (newPair[0] && newPair[1] && newPair[0] !== newPair[1]) {
                  setPairs(ps => [...ps, newPair]); setNewPair(["", ""]);
                }
              }} style={{ fontSize: 12, padding: "6px 12px" }}>加入配對</Btn>
            </div>
          </div>
        )}

        {/* 手動編輯按鈕列 */}
        <div style={{ marginBottom: 14, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          {!editMode ? (
            <Btn variant="secondary" onClick={startEdit} style={{ fontSize: 12, padding: "6px 14px" }}>
              ✏️ 手動調整轉帳
            </Btn>
          ) : (
            <>
              <Btn onClick={saveCustom} style={{ fontSize: 12, padding: "6px 14px" }}>💾 儲存此結算</Btn>
              <Btn variant="secondary" onClick={cancelEdit} style={{ fontSize: 12, padding: "6px 14px" }}>取消</Btn>
              <span style={{ color: C.dim, fontSize: 11, fontFamily: "monospace" }}>
                可改金額、新增/刪除收款人 · 輸家總額與每位贏家應收都必須對得上才能存
              </span>
            </>
          )}
          {saveMsg && <span style={{ color: C.green, fontSize: 12 }}>{saveMsg}</span>}
        </div>

        {/* Settlement grid */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, alignItems: "start" }}>
          <div>
            {Object.entries(displayMap).map(([key, entry]) => {
              const currentSum = entry.pays.reduce((a, p) => a + (parseInt(p.amount) || 0), 0);
              const diff = entry.total - currentSum;
              // 收款人下拉：列出所有 pool 中尚未在此 entry 的人
              const availableToAdd = pool.filter(p => !entry.pays.some(pay => pay.toId === p.id));
              return (
                <div key={key} style={{ background: C.surface2, border: `1px solid ${editMode && diff !== 0 ? C.red : C.border}`, borderRadius: 6, overflow: "hidden", marginBottom: 12 }}>
                  <div style={{ padding: "8px 12px", background: "#e0555511", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ color: C.red, fontWeight: 700, fontSize: 14 }}>▼ {entry.loserLabel}</span>
                    <span style={{ fontFamily: "monospace", color: C.red, fontWeight: 700, fontSize: 13 }}>須付 {fmtAbs(entry.total)}</span>
                  </div>
                  {entry.pays.map((p, i) => (
                    <div key={i} style={{ padding: "6px 12px", borderBottom: `1px solid ${C.border}33`, display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, gap: 8 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ color: C.text }}>{p.toLabel}</div>
                        {p.toBank && <div style={{ fontFamily: "monospace", fontSize: 11, color: C.dim, overflow: "hidden", textOverflow: "ellipsis" }}>{p.toBank}</div>}
                      </div>
                      {editMode ? (
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="text" inputMode="numeric" value={p.amount}
                            placeholder="0"
                            onChange={e => updatePayAmount(key, i, e.target.value)}
                            style={{ width: 90, background: C.surface, border: `1px solid ${C.gold}66`, color: C.green,
                              padding: "4px 8px", borderRadius: 3, fontFamily: "monospace", fontWeight: 700, fontSize: 13, textAlign: "right", outline: "none" }} />
                          <button onClick={() => removePay(key, i)} title="刪除"
                            style={{ background: "transparent", border: `1px solid ${C.red}66`, color: C.red,
                              padding: "2px 7px", borderRadius: 3, cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>✕</button>
                        </div>
                      ) : (
                        <span style={{ fontFamily: "monospace", color: C.green, fontWeight: 700 }}>+{fmtAbs(p.amount)}</span>
                      )}
                    </div>
                  ))}
                  {editMode && availableToAdd.length > 0 && (
                    <div style={{ padding: "6px 12px", borderBottom: `1px solid ${C.border}33`, display: "flex", gap: 6, alignItems: "center" }}>
                      <select onChange={e => { if (e.target.value) { addPay(key, e.target.value); e.target.value = ""; } }}
                        defaultValue=""
                        style={{ flex: 1, background: C.surface, border: `1px solid ${C.gold}55`, color: C.goldLight,
                          padding: "4px 8px", borderRadius: 3, fontSize: 12, fontFamily: "inherit", outline: "none" }}>
                        <option value="">＋ 新增收款人</option>
                        {availableToAdd.map(p => (
                          <option key={p.id} value={p.id}>{p.label}（應收 {fmtAbs(p.amount)}）</option>
                        ))}
                      </select>
                    </div>
                  )}
                  {editMode && (
                    <div style={{ padding: "6px 12px", background: diff === 0 ? C.green+"15" : C.red+"15", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 11, fontFamily: "monospace" }}>
                      <span style={{ color: C.dim }}>目前總額：{currentSum}</span>
                      <span style={{ color: diff === 0 ? C.green : C.red, fontWeight: 700 }}>
                        {diff === 0 ? "✓ 平衡" : `差 ${diff > 0 ? "+" : ""}${diff}`}
                      </span>
                    </div>
                  )}
                  {!editMode && (
                    <div style={{ padding: "5px 10px 8px", textAlign: "right" }}>
                      <Btn variant="secondary" onClick={() => copyBill(entry)} style={{ fontSize: 11, padding: "4px 10px" }}>
                        {copied === entry.loserLabel ? "✅ 已複製" : "📋 複製帳單"}
                      </Btn>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 16 }}>
            <SectionHeader>本場收款方</SectionHeader>
            {pool.map((p, i) => {
              // 計算此贏家在編輯中實際收到的總額
              let received = 0;
              Object.values(displayMap).forEach(entry => {
                entry.pays.forEach(pay => {
                  if (pay.toId === p.id) received += (parseInt(pay.amount) || 0);
                });
              });
              const winnerDiff = p.amount - received;
              return (
                <div key={i} style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 600, fontSize: 13 }}>
                    <span>{p.label}{p.splittable && <span style={{ fontSize: 10, color: C.dim, marginLeft: 4 }}>(可拆)</span>}</span>
                    <span style={{ fontFamily: "monospace", color: C.green }}>+{fmtAbs(p.amount)}</span>
                  </div>
                  {p.bank && <div style={{ fontFamily: "monospace", fontSize: 11, color: C.dim }}>{p.bank}</div>}
                  {editMode && (
                    <div style={{ fontSize: 10, fontFamily: "monospace", marginTop: 2,
                      color: winnerDiff === 0 ? C.green : C.red }}>
                      {winnerDiff === 0 ? `✓ 已收齊 ${received}` : `目前 ${received}，差 ${winnerDiff > 0 ? "+" : ""}${winnerDiff}`}
                    </div>
                  )}
                </div>
              );
            })}
            <Divider />
            <FR label="水錢餘 → Joyce（公積金）" value={fmt(res)} valueColor={res >= 0 ? C.gold : C.red} />
            <FR label="Dealer（薪+小費）" value={fmt(dealerTotal)} valueColor={dealerTotal >= 0 ? C.green : C.red} />
          </div>
        </div>
      </>}
    </div>
  );
}

// TAB: CUMULATIVE
// ═══════════════════════════════════════════════════════
function TabCumul({ data }) {
  const { sessions, members } = data;

  // ─── 季度與年份篩選 ───
  const years = [...new Set(sessions.map(s => (s.date || "").slice(0, 4)).filter(Boolean))].sort().reverse();
  const currentYear = years[0] || String(new Date().getFullYear());
  const [filterYear, setFilterYear] = useState(currentYear);
  const [filterQ, setFilterQ] = useState("all"); // all / Q1 / Q2 / Q3 / Q4

  const Q_MONTHS = { Q1: [1, 2, 3], Q2: [4, 5, 6], Q3: [7, 8, 9], Q4: [10, 11, 12] };

  const inFilter = (s) => {
    const d = s.date || "";
    const y = d.slice(0, 4);
    const m = parseInt(d.slice(5, 7)) || 0;
    if (filterYear !== "all" && y !== filterYear) return false;
    if (filterQ !== "all" && !Q_MONTHS[filterQ].includes(m)) return false;
    return true;
  };

  const filteredSessions = sessions.filter(inFilter);

  const map = {};
  filteredSessions.forEach(s => s.players.forEach(p => {
    if (p.type === "dealer") return;
    const k = resolveId(p.name, members);
    if (!map[k]) map[k] = { name: dispName(p.name, members), count: 0, total: 0, best: -Infinity, worst: Infinity };
    map[k].count++; map[k].total += p.amount;
    if (p.amount > map[k].best) map[k].best = p.amount;
    if (p.amount < map[k].worst) map[k].worst = p.amount;
  }));
  const rows = Object.values(map).sort((a, b) => b.total - a.total);

  // ─── 每季冠軍（依目前選的年份，算出該年 4 季各自的冠軍）───
  const champYear = filterYear === "all" ? currentYear : filterYear;
  const quarterChamps = ["Q1", "Q2", "Q3", "Q4"].map(q => {
    const qSessions = sessions.filter(s => {
      const d = s.date || "";
      if (d.slice(0, 4) !== champYear) return false;
      const m = parseInt(d.slice(5, 7)) || 0;
      return Q_MONTHS[q].includes(m);
    });
    const qMap = {};
    qSessions.forEach(s => s.players.forEach(p => {
      if (p.type === "dealer") return;
      const k = resolveId(p.name, members);
      if (!qMap[k]) qMap[k] = { name: dispName(p.name, members), total: 0 };
      qMap[k].total += p.amount;
    }));
    const sorted = Object.values(qMap).sort((a, b) => b.total - a.total);
    return { q, champ: sorted[0] || null, loser: sorted.length > 1 ? sorted[sorted.length - 1] : null, sessionCount: qSessions.length };
  });

  const Q_LABELS = { all: "全年", Q1: "Q1 (1-3月)", Q2: "Q2 (4-6月)", Q3: "Q3 (7-9月)", Q4: "Q4 (10-12月)" };

  const pill = (active) => ({
    padding: "6px 13px", borderRadius: 20, cursor: "pointer", fontSize: 12, fontFamily: "inherit",
    border: `1px solid ${active ? C.gold : C.border}`,
    background: active ? C.gold : "transparent",
    color: active ? "#000" : C.dim,
    fontWeight: active ? 700 : 400, whiteSpace: "nowrap",
  });

  return (
    <div>
      {/* 年份 + 季度篩選 */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ display: "flex", gap: 7, marginBottom: 10, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontSize: 11, color: C.dim, marginRight: 4 }}>年份</span>
          <button onClick={() => setFilterYear("all")} style={pill(filterYear === "all")}>全部</button>
          {years.map(y => (
            <button key={y} onClick={() => setFilterYear(y)} style={pill(filterYear === y)}>{y}</button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontSize: 11, color: C.dim, marginRight: 4 }}>季度</span>
          {["all", "Q1", "Q2", "Q3", "Q4"].map(q => (
            <button key={q} onClick={() => setFilterQ(q)} style={pill(filterQ === q)}>{Q_LABELS[q]}</button>
          ))}
        </div>
      </div>

      {/* 每季輸贏王 */}
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontSize: 12, color: C.gold, letterSpacing: "0.1em", marginBottom: 10, fontFamily: "monospace" }}>
          🏆 {champYear} 每季輸贏王
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(150px,1fr))", gap: 11 }}>
          {quarterChamps.map(({ q, champ, loser, sessionCount }) => (
            <div key={q} style={{
              background: champ ? "linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.04))" : C.surface,
              border: `1px solid ${champ ? C.gold : C.border}`, borderRadius: 8, padding: "13px 15px",
            }}>
              <div style={{ fontSize: 10, color: C.dim, letterSpacing: "0.1em", marginBottom: 7 }}>{Q_LABELS[q]}</div>
              {champ ? (
                <div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: C.goldLight, marginBottom: 1 }}>👑 {champ.name}</div>
                  <div style={{ fontFamily: "monospace", fontSize: 13, fontWeight: 700, color: champ.total >= 0 ? C.green : C.red }}>{fmt(champ.total)}</div>
                  {loser && (
                    <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.border}` }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: C.red, marginBottom: 1 }}>🐟 {loser.name}</div>
                      <div style={{ fontFamily: "monospace", fontSize: 12, fontWeight: 700, color: C.red }}>{fmt(loser.total)}</div>
                    </div>
                  )}
                  <div style={{ fontSize: 10, color: C.dim, marginTop: 7 }}>{sessionCount} 場</div>
                </div>
              ) : (
                <div style={{ fontSize: 13, color: C.dim, paddingTop: 4 }}>尚無資料</div>
              )}
            </div>
          ))}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(150px,1fr))", gap: 11, marginBottom: 22 }}>
        {[
          { label: "場次", value: filteredSessions.length, color: C.gold },
          { label: "人數",  value: rows.length, color: C.blue },
          { label: "最大贏家", value: rows[0]?.name || "-", color: C.green },
          { label: "最大輸家", value: rows.length ? rows[rows.length - 1].name : "-", color: C.red },
        ].map((s, i) => (
          <div key={i} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "13px 15px", textAlign: "center" }}>
            <div style={{ fontSize: 10, color: C.dim, letterSpacing: "0.13em", marginBottom: 6 }}>{s.label}</div>
            <div style={{ fontFamily: "monospace", fontSize: 18, fontWeight: 700, color: s.color }}>{s.value}</div>
          </div>
        ))}
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr>{["名次","姓名","出席","累計輸贏","最佳場","最差場"].map(h => (
              <th key={h} style={{ textAlign: "left", padding: "8px 12px", borderBottom: `1px solid ${C.gold}`, color: C.gold, fontSize: 11, fontWeight: 400, letterSpacing: "0.1em", fontFamily: "monospace" }}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {rows.map((r, i) => {
              const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i + 1);
              return (
              <tr key={i} style={{ borderBottom: `1px solid ${C.border}` }}>
                <td style={{ padding: "7px 12px", fontFamily: "monospace", color: i < 3 ? C.gold : C.dim, fontWeight: i < 3 ? 700 : 400, fontSize: i < 3 ? 15 : 13 }}>{medal}</td>
                <td style={{ padding: "7px 12px" }}>{r.name}</td>
                <td style={{ padding: "7px 12px", fontFamily: "monospace" }}>{r.count}</td>
                <td style={{ padding: "7px 12px", fontFamily: "monospace", fontWeight: 700, color: r.total >= 0 ? C.green : C.red }}>{fmt(r.total)}</td>
                <td style={{ padding: "7px 12px", fontFamily: "monospace", color: C.green }}>{r.best === -Infinity ? "-" : fmt(r.best)}</td>
                <td style={{ padding: "7px 12px", fontFamily: "monospace", color: C.red }}>{r.worst === Infinity ? "-" : fmt(r.worst)}</td>
              </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// TAB: RESERVE
// ═══════════════════════════════════════════════════════
function TabReserve({ data, setData }) {
  const dialog = useDialog();
  const { sessions, expenses = [] } = data;
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ date: "", amount: "", desc: "" });

  const events = [
    ...sessions.map(s => ({ date: s.date, amount: calcReserve(s), note: s.note, kind: "session", id: s.id })),
    ...expenses.map(e => ({ date: e.date, amount: -e.amount, note: e.desc, kind: "expense", id: e.id })),
  ].sort((a, b) => a.date < b.date ? -1 : 1);

  let run = 0;
  const items = events.map(ev => { run += ev.amount; return { ...ev, run }; });
  const total = run;

  const saveExpense = () => {
    if (!form.date || !form.amount) { dialog.alert("請填日期和金額"); return; }
    const newExp = { id: "e" + Date.now(), date: form.date, amount: parseInt(form.amount) || 0, desc: form.desc };
    setData(d => ({ ...d, expenses: [...(d.expenses || []), newExp].sort((a, b) => a.date < b.date ? -1 : 1) }));
    setModal(false); setForm({ date: "", amount: "", desc: "" });
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 14, alignItems: "flex-start", marginBottom: 20, flexWrap: "wrap" }}>
        <div style={{ background: "linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05))", border: `1px solid ${C.gold}`, borderRadius: 8, padding: "16px 24px", textAlign: "center" }}>
          <div style={{ fontSize: 10, color: C.dim, letterSpacing: "0.14em", marginBottom: 6 }}>公積金餘額</div>
          <div style={{ fontFamily: "monospace", fontSize: 28, fontWeight: 700, color: C.goldLight }}>${fmtAbs(total)}</div>
        </div>
        <Btn onClick={() => setModal(true)} style={{ alignSelf: "flex-end" }}>－ 新增支出</Btn>
      </div>

      <div style={{ maxWidth: 540 }}>
        {items.map((it, i) => (
          <div key={it.id} style={{ display: "flex", gap: 16 }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 16, flexShrink: 0 }}>
              <div style={{ width: 10, height: 10, borderRadius: "50%", marginTop: 5, flexShrink: 0, border: `2px solid ${C.bg}`,
                background: it.kind === "expense" ? C.blue : it.amount < 0 ? C.red : C.gold }} />
              {i < items.length - 1 && <div style={{ width: 2, flex: 1, background: C.border, minHeight: 26 }} />}
            </div>
            <div style={{ paddingBottom: 20, flex: 1 }}>
              <div style={{ fontFamily: "monospace", fontSize: 11, color: C.dim, marginBottom: 4 }}>
                {it.date} {it.kind === "expense" && <span style={{ fontSize: 10, color: C.blue }}>[支出]</span>}
              </div>
              <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 5, padding: "10px 12px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontFamily: "monospace", fontSize: 15, fontWeight: 700, color: it.amount >= 0 ? C.gold : C.red }}>{fmt(it.amount)}</span>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <span style={{ fontFamily: "monospace", fontSize: 12, color: C.dim }}>累計 {fmt(it.run)}</span>
                    {it.kind === "expense" && (
                      <button onClick={async () => {
                        if (await dialog.confirm("刪除此支出？")) setData(d => ({ ...d, expenses: d.expenses.filter(e => e.id !== it.id) }));
                      }} style={{ background: "transparent", border: "none", color: C.muted, cursor: "pointer", fontSize: 12 }}>✕</button>
                    )}
                  </div>
                </div>
                {it.note && <div style={{ fontSize: 11, color: C.dim, marginTop: 3 }}>📝 {it.note}</div>}
              </div>
            </div>
          </div>
        ))}
      </div>

      <Modal open={modal} title="新增公積金支出" onClose={() => setModal(false)} onSave={saveExpense}>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <Input label="📅 日期" type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          <Input label="💸 金額" type="number" placeholder="e.g. 3200" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />
          <Input label="📝 說明" placeholder="e.g. 餐費 Shaan 2200" value={form.desc} onChange={e => setForm(f => ({ ...f, desc: e.target.value }))} />
        </div>
      </Modal>
    </div>
  );
}

// TAB: BONUS
// ═══════════════════════════════════════════════════════
function TabBonus({ data }) {
  const { sessions, members } = data;
  const all = sessions.flatMap(s => (s.bonusEvents || []).map(b => ({ date: s.date, ...b })));
  const mTotal = all.filter(b => b.type === "monster").reduce((a, b) => a + b.amount, 0);
  const hTotal = all.filter(b => b.type === "highhand").reduce((a, b) => a + b.amount, 0);
  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(150px,1fr))", gap: 11, marginBottom: 22 }}>
        {[
          { label: "🐲 怪物累計", value: `$${fmtAbs(mTotal)}`, color: "#f87171" },

// TAB: MEMBERS
// ═══════════════════════════════════════════════════════
function TabMembers({ data, setData }) {
  const { members } = data;
  const [modal, setModal] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ name: "", aliases: "", bank: "", type: "member" });
  const [defaultType, setDefaultType] = useState("member");

  const TYPE_LABEL = { member: "成員", dealer: "Dealer", guest: "來賓", venue: "場地" };
  const TYPE_COLOR = { member: C.blue, dealer: C.gold, guest: C.accent, venue: C.green };

  const openAdd = (type) => { setDefaultType(type); setEditId(null); setForm({ name: "", aliases: "", bank: "", type }); setModal(true); };
  const openEdit = (m) => { setEditId(m.id); setForm({ name: m.name, aliases: m.aliases.join(","), bank: m.bank, type: m.type }); setModal(true); };

  const dialog = useDialog();
  const save = async () => {
    const name = form.name.trim();
    if (!name) { await dialog.alert("請填名稱"); return; }
    const aliases = form.aliases.split(",").map(a => a.trim()).filter(Boolean);
    if (!aliases.includes(name)) aliases.unshift(name);
    if (editId) {
      const entry = { id: editId, name, aliases, bank: form.bank, type: form.type };
      setData(d => ({ ...d, members: d.members.map(m => m.id === editId ? entry : m) }));
    } else {
      if (members.find(m => m.id === name)) { await dialog.alert(`名稱「${name}」已存在，請改用其他名稱`); return; }
      const entry = { id: name, name, aliases, bank: form.bank, type: form.type };
      setData(d => ({ ...d, members: [...d.members, entry] }));
    }
    setModal(false);
  };

  const del = async () => {
    if (!(await dialog.confirm("確定刪除？"))) return;
    setData(d => ({ ...d, members: d.members.filter(m => m.id !== editId) }));
    setModal(false);
  };

  const order = { member: 0, dealer: 1, venue: 2, guest: 3 };
  const sorted = [...members].sort((a, b) => (order[a.type] ?? 9) - (order[b.type] ?? 9) || a.name.localeCompare(b.name));

  return (
    <div>
      <div style={{ marginBottom: 14, display: "flex", gap: 8, flexWrap: "wrap" }}>
        <Btn onClick={() => openAdd("member")}>＋ 新增成員</Btn>
        <Btn variant="accent" onClick={() => openAdd("guest")}>＋ 新增來賓</Btn>
        <Btn variant="dark" onClick={() => openAdd("dealer")}>＋ 新增Dealer</Btn>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(250px,1fr))", gap: 10 }}>
        {sorted.map(m => (
          <div key={m.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "12px 14px", display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>
                {m.name}
                <span style={{ fontSize: 10, padding: "1px 5px", borderRadius: 3, marginLeft: 5, background: (TYPE_COLOR[m.type] || C.dim) + "22", color: TYPE_COLOR[m.type] || C.dim, border: `1px solid ${(TYPE_COLOR[m.type] || C.dim)}44` }}>
                  {TYPE_LABEL[m.type] || m.type}
                </span>
              </div>
              <div style={{ fontSize: 11, color: C.dim, marginTop: 2 }}>別名：{m.aliases.join("、")}</div>
              <div style={{ fontFamily: "monospace", fontSize: 11, color: C.muted, marginTop: 2 }}>{m.bank || "—"}</div>
            </div>
            <button onClick={() => openEdit(m)} style={{ background: "transparent", border: `1px solid ${C.border}`, color: C.dim, padding: "3px 9px", borderRadius: 4, cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" }}>編輯</button>
          </div>
        ))}
      </div>

      <Modal open={modal} title={editId ? `編輯：${form.name}` : `新增${TYPE_LABEL[defaultType]}`} onClose={() => setModal(false)} onSave={save}>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <Input label="顯示名稱" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="名稱" />
          <Input label="別名（逗號分隔）" value={form.aliases} onChange={e => setForm(f => ({ ...f, aliases: e.target.value }))} placeholder="別名1,別名2" />
          <Input label="銀行帳號（選填）" value={form.bank} onChange={e => setForm(f => ({ ...f, bank: e.target.value }))} placeholder="e.g. 012-123456789" />
          <Select label="類型" value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))}>
            <option value="member">成員</option>
            <option value="guest">來賓</option>
            <option value="dealer">Dealer</option>
            <option value="venue">場地</option>
          </Select>
          {editId && <Btn variant="danger" onClick={del} style={{ marginTop: 4 }}>🗑 刪除成員</Btn>}
        </div>
      </Modal>
    </div>
  );
}
