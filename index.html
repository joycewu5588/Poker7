<style>
  * { -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #0a0c10; font-family: 'Noto Serif TC', serif; }
  #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #c9a84c; font-family: 'IBM Plex Mono', monospace; font-size: 14px; flex-direction: column; gap: 12px; }
  .spin { width: 32px; height: 32px; border: 3px solid #2a3050; border-top-color: #c9a84c; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #pw-gate { position: fixed; inset: 0; background: #0a0c10; z-index: 99999;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    font-family: 'Noto Serif TC', serif; }
  #pw-gate .box { background: #12151e; border: 1px solid #c9a84c;
    border-radius: 8px; padding: 28px 24px; width: 90%; max-width: 320px; text-align: center; }
  #pw-gate h1 { color: #c9a84c; margin: 0 0 4px; font-size: 22px; font-weight: 700; }
  #pw-gate p { color: #8d92aa; font-size: 12px; margin: 0 0 18px; font-family: 'IBM Plex Mono', monospace; }
  /* 密碼點點顯示 */
  #pw-dots { display: flex; justify-content: center; gap: 14px; margin: 4px 0 22px; }
  #pw-dots .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #2a3050; transition: all .15s; }
  #pw-dots .dot.filled { background: #c9a84c; border-color: #c9a84c; }
  /* 9 宮格鍵盤 */
  #pw-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  #pw-keypad .key { aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    background: #1a1f2e; border: 1px solid #2a3050; border-radius: 12px;
    color: #e8e4d8; font-size: 26px; font-weight: 600; font-family: 'IBM Plex Mono', monospace;
    cursor: pointer; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: background .1s; }
  #pw-keypad .key:active { background: #c9a84c; color: #0a0c10; }
  #pw-keypad .key.fn { font-size: 15px; background: transparent; border-color: transparent; color: #8d92aa; }
  #pw-keypad .key.fn:active { background: #2a3050; color: #e8e4d8; }
  #pw-gate .err { color: #d97070; font-size: 12px; margin-top: 16px; min-height: 16px;
    font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>
<script>
var _pwEntered = "";
var _pwTarget = "168168";
var _pwReadonly = "200000"; // 唯讀密碼：只能看統計

function _pwRenderDots() {
  var dots = document.querySelectorAll("#pw-dots .dot");
  for (var i = 0; i < dots.length; i++) {
    if (i < _pwEntered.length) dots[i].classList.add("filled");
    else dots[i].classList.remove("filled");
  }
}

var _pwLastTapTs = 0;
function _pwTap(e, d) {
  try { if (e && e.preventDefault) e.preventDefault(); } catch(err) {}
  var now = Date.now();
  // pointerdown 與隨後的 click 只算一次
  if (e && e.type === "click" && now - _pwLastTapTs < 500) return;
  _pwLastTapTs = now;
  if (d === "del") { _pwDel(); } else { _pwPress(d); }
}
function _pwPress(d) {
  if (_pwEntered.length >= 6) return;
  _pwEntered += d;
  _pwRenderDots();
  var err = document.getElementById("pw-err");
  if (err) err.textContent = "";
  if (_pwEntered.length === 6) {
    setTimeout(_pwSubmit, 120);
  }
}

function _pwDel() {
  _pwEntered = _pwEntered.slice(0, -1);
  _pwRenderDots();
}

function _pwSubmit() {
  if (_pwEntered === _pwTarget) {
    // 完整權限密碼
    try { sessionStorage.setItem("guandi_pw_ok", "1"); } catch(e) {}
    window.__readonly = false;
    document.getElementById("pw-gate").style.display = "none";
    if (!window.__currentUser) {
      _showUserGate();

function DialogProvider({ children }) {
  const [dialog, setDialog] = useState(null);

  const confirm = (message) => new Promise((resolve) => {
    setDialog({ type: "confirm", message, resolve });
  });

  const alert = (message) => new Promise((resolve) => {

  });

}

const fmt    = n => (n >= 0 ? "+" : "-") + Math.abs(n).toLocaleString();
const fmtAbs = n => Math.abs(n).toLocaleString();
const calcReserve = s => {
  // 用公式重算（包含管家小費），舊資料的 reserveOverride 不再優先採用
  const calc = s.totalWater - s.venueFee - s.dealerWage - (s.helperTip || 0);
  return calc;
};

function resolveId(name, members) {
  const n = (name || "").trim().toLowerCase();
  for (const m of members) if (m.aliases.some(a => a.toLowerCase() === n)) return m.id;
  return name;
}
const getMember  = (n, members) => members.find(m => m.id === resolveId(n, members)) || null;
const dispName   = (n, members) => { const m = getMember(n, members); return m ? m.name : n; };
const bankOf     = (n, members) => { const m = getMember(n, members); return m ? (m.bank || "") : ""; };

// Greedy minimum-transfers settlement
function buildSettle(s, members, pairs) {
  const res = calcReserve(s);
  const dealerTips = s.players.filter(p => p.type === "dealer").reduce((a, p) => a + p.amount, 0);
  const dealerTotal = s.dealerWage + dealerTips;
  const helperTotal = s.helperTip || 0; // 管家小費
  const regular = s.players.filter(p => p.type !== "dealer");

  // 找出 Dealer 的 id (如果有的話)
  const dealerEntryEarly = s.players.find(p => p.type === "dealer");
  const dealerId = dealerEntryEarly ? resolveId(dealerEntryEarly.name, members) : null;
  const dealerName = dealerEntryEarly ? dealerEntryEarly.name : null;

  // 檢查 Dealer 是否在 pairs 中（要跟某玩家合併）
  let dealerMergedInto = null;
  if (dealerId) {
    for (const pair of pairs) {
      if (pair.includes(dealerId)) {
        dealerMergedInto = pair[0];
        break;
      }
    }
  }

  // 檢查管家是否在 pairs 中
  let helperMergedInto = null;
  for (const pair of pairs) {
    if (pair.includes("管家")) {
      helperMergedInto = pair[0];
      break;
    }
  }

  // 場地：用該場次選的場地（可能有多個場地成員）
  const venueId = s.venueId || "場地";
  const venueMemberObj = members.find(m => m.id === venueId);
  const venueLabel = venueMemberObj ? venueMemberObj.name : "場地";

  // 檢查場地是否在 pairs 中（在某玩家家裡打，場地費併給他）
  let venueMergedInto = null;
  for (const pair of pairs) {
    if (pair.includes(venueId)) {
      venueMergedInto = pair[0];
      break;
    }
  }

  // 檢查公積金是否在 pairs 中（例如併入 Gary+Joyce）
  let reserveMergedInto = null;
  for (const pair of pairs) {
    if (pair.includes("公積金")) {
      reserveMergedInto = pair[0];
      break;
    }
  }

  // pair 內 id → 顯示名稱
  const pairName = (id) => {
    if (id === "管家") return "管家";
    if (id === "公積金") return "公積金";
    const m = members.find(x => x.id === id);
    return m ? m.name : id;
  };
  // pair 的收款帳號：取第一個有帳號的成員
  const pairBank = (pair) => {
    for (const id of pair) { const b = bankOf(id, members); if (b) return b; }
    return "";
  };

  // Apply pairing: merge paired players
  const merged = {};
  for (const p of regular) {
    const pid = resolveId(p.name, members);
    let groupId = pid;
    let groupName = dispName(p.name, members);
    let groupBank = bankOf(pid, members);
    for (const pair of pairs) {
      if (pair.includes(pid)) {
        groupId = pair[0];
        groupName = pair.map(pairName).join("+");
        groupBank = pairBank(pair);
        break;
      }
    }
    if (!merged[groupId]) merged[groupId] = { label: groupName, id: groupId, bank: groupBank, amount: 0 };
    merged[groupId].amount += p.amount;
  }

  // 通用：把某個「收款額」併進配對群組（Dealer / 管家 / 場地 / 公積金）
  const mergeInto = (target, token, amount) => {
    if (!merged[target]) {
      const pr = pairs.find(p => p.includes(token));
      merged[target] = { label: pr.map(pairName).join("+"), id: target, bank: pairBank(pr), amount: 0 };
    }
    merged[target].amount += amount;
  };

  if (dealerMergedInto !== null && dealerTotal !== 0) mergeInto(dealerMergedInto, dealerId, dealerTotal);
  if (helperMergedInto !== null && helperTotal !== 0) mergeInto(helperMergedInto, "管家", helperTotal);
  if (venueMergedInto !== null && s.venueFee !== 0) mergeInto(venueMergedInto, venueId, s.venueFee);
  if (reserveMergedInto !== null && res !== 0) mergeInto(reserveMergedInto, "公積金", res);

  const groups = Object.values(merged);
  const winners = groups.filter(g => g.amount > 0).sort((a, b) => b.amount - a.amount);
  const losers  = groups.filter(g => g.amount < 0).sort((a, b) => a.amount - b.amount);

  const pool = [];
  winners.forEach(g => pool.push({ label: g.label, id: g.id, bank: g.bank || bankOf(g.id, members), amount: g.amount, splittable: false }));
  // Dealer 沒被併入 pair 時，獨立放進 pool
  if (dealerTotal > 0 && dealerMergedInto === null) {
    pool.push({ label: "Dealer " + dispName(dealerName, members), id: dealerId, bank: bankOf(dealerId, members), amount: dealerTotal, splittable: true });
  }
  // 管家沒被併入 pair 時，獨立放進 pool（沒銀行帳號）
  if (helperTotal > 0 && helperMergedInto === null) {
    pool.push({ label: "管家", id: "管家", bank: "", amount: helperTotal, splittable: true });
  }
  // 場地沒被併入 pair 時，用該場選的場地帳號
  if (s.venueFee > 0 && venueMergedInto === null) {
    pool.push({ label: venueLabel, id: venueId, bank: bankOf(venueId, members), amount: s.venueFee, splittable: false });
  }
  if (res > 0 && reserveMergedInto === null) pool.push({ label: "公積金 (Joyce)", id: "Joyce", bank: bankOf("Joyce", members), amount: res, splittable: true });

  const negPool = losers.map(g => ({ label: g.label, id: g.id, amount: -g.amount }));
  if (res < 0 && reserveMergedInto === null) negPool.push({ label: "公積金補差", id: "Joyce", amount: -res });
  negPool.sort((a, b) => b.amount - a.amount);

  // Settlement order: bigger pools first (so losers fill them in one shot),
  // but Gary goes near the end (so he absorbs leftovers as the "split-friendly" winner),
  // and splittable items (公積金 Joyce) go last.
  const isGary = p => p.id === "Gary";
  const nonSplit = pool.filter(p => !p.splittable);
  const splittable = pool.filter(p => p.splittable);
  const nonGarySorted = nonSplit.filter(p => !isGary(p)).sort((a, b) => b.amount - a.amount);
  const garyItems = nonSplit.filter(isGary);
  const poolRem = [...nonGarySorted, ...garyItems, ...splittable].map(p => ({ ...p, rem: p.amount }));

  const paymentMap = {};

  // ──────────────────────────────────────────────
  // 子集合配對：用 bit-mask 嘗試所有非可拆贏家的子集合
  // 找出總和 = 輸家欠款 的最佳組合
  // 偏好：贏家數量越多越好（一次清理越多贏家）
  // ──────────────────────────────────────────────
  function findBestCombo(targetAmt, pool) {
    const candidates = pool.filter(it => !it.splittable && !isGary(it) && it.rem > 0);
    if (candidates.length === 0) return null;
    if (candidates.length > 18) {
      // 太多就退回 3 個的搜尋，避免太慢
      for (const a of candidates) if (a.rem === targetAmt) return { items: [a], count: 1 };
      for (let i = 0; i < candidates.length; i++)
        for (let j = i + 1; j < candidates.length; j++)
          if (candidates[i].rem + candidates[j].rem === targetAmt)
            return { items: [candidates[i], candidates[j]], count: 2 };
      for (let i = 0; i < candidates.length; i++)
        for (let j = i + 1; j < candidates.length; j++)
          for (let k = j + 1; k < candidates.length; k++)
            if (candidates[i].rem + candidates[j].rem + candidates[k].rem === targetAmt)
              return { items: [candidates[i], candidates[j], candidates[k]], count: 3 };
      return null;
    }

    let best = null;
    const N = candidates.length;
    for (let mask = 1; mask < (1 << N); mask++) {
      let sum = 0, count = 0;
      for (let i = 0; i < N; i++) {
        if (mask & (1 << i)) { sum += candidates[i].rem; count++; if (sum > targetAmt) break; }
      }
      if (sum !== targetAmt) continue;
      // 偏好「最少筆數」的精準組合（1:1 完美配對最優先），避免一個輸家付太多筆
      if (!best || count < best.count) {
        const items = [];
        for (let i = 0; i < N; i++) if (mask & (1 << i)) items.push(candidates[i]);
        best = { items: items, count: count };
        if (count === 1) return best; // 找到 1:1 直接用
      }
    }
    return best;
  }

  // ──────────────────────────────────────────────
  // Pass A：迭代式找最佳配對。
  // 每輪挑「筆數最少」的精準配對先固定（1:1 最優先），
  // 同筆數時先處理大輸家，讓筆數平均分散。
  // ──────────────────────────────────────────────
  while (true) {
    let bestPair = null;
    for (const loser of negPool) {
      if (loser._done) continue;
      const combo = findBestCombo(loser.amount, poolRem);
      if (!combo) continue;
      if (!bestPair || combo.count < bestPair.combo.count ||
          (combo.count === bestPair.combo.count && loser.amount > bestPair.loser.amount)) {
        bestPair = { loser: loser, combo: combo };
      }
    }
    if (!bestPair) break;
    const pays = [];
    for (const item of bestPair.combo.items) {
      pays.push({ toLabel: item.label, toId: item.id, toBank: item.bank, amount: item.rem });
      item.rem = 0;
    }
    paymentMap[bestPair.loser.id + "||" + bestPair.loser.label] = { loserLabel: bestPair.loser.label, loserId: bestPair.loser.id, total: bestPair.loser.amount, pays };
    bestPair.loser._done = true;
  }

  // ──────────────────────────────────────────────
  // Pass B：剩下輸家用「輪流分配」貪婪法
  // 每一輪每個輸家各配一筆（優先付剩額最大的收款方），
  // 筆數平均分散，不會一人 2 筆另一人 5 筆
  // ──────────────────────────────────────────────
  const SMALL_LEFTOVER = 5000;
  const venueIdsAll = members.filter(m => m.type === "venue").map(m => m.id);
  const rrState = negPool.filter(l => !l._done).sort((a, b) => b.amount - a.amount)
    .map(l => ({ loser: l, rem: l.amount, pays: [] }));

  const pickOne = (rem) => {
    const sorted = poolRem.filter(it => it.rem > 0).sort((a, b) => b.rem - a.rem);
    for (const item of sorted) {
      if (!item.splittable && !isGary(item) && rem < item.rem) {
        // 部分支付會讓這位收款人要跟多個輸家收：
        // 場地必須一筆收齊；若會留下 <5000 的零碎尾款也避免
        const isVenue = venueIdsAll.includes(item.id);
        const leftover = item.rem - rem;
        const hasOther = poolRem.some(it => it !== item && it.rem > 0 && (it.splittable || isGary(it) || it.rem <= rem));
        if ((isVenue || leftover < SMALL_LEFTOVER) && hasOther) continue;
      }
      return item;
    }
    return null;
  };

  let rrGuard = 0;
  while (rrState.some(st => st.rem > 0) && rrGuard++ < 200) {
    let progressed = false;
    for (const st of rrState) {
      if (st.rem <= 0) continue;
      const item = pickOne(st.rem);
      if (!item) continue;
      const take = Math.min(st.rem, item.rem);
      st.pays.push({ toLabel: item.label, toId: item.id, toBank: item.bank, amount: take });
      item.rem -= take;
      st.rem -= take;
      progressed = true;
    }
    if (!progressed) break;
  }
  rrState.forEach(st => {
    paymentMap[st.loser.id + "||" + st.loser.label] = { loserLabel: st.loser.label, loserId: st.loser.id, total: st.loser.amount, pays: st.pays };
  });
  return { pool, paymentMap, res, dealerTotal };
}

const C = {
  bg: "#0a0c10", surface: "#12151e", surface2: "#1a1f2e", border: "#252d45",
  gold: "#c9a84c", goldLight: "#f0d080", red: "#e05555", green: "#4caf7d",
  blue: "#4a90d9", text: "#e8e4d8", dim: "#6a6e88", muted: "#3a3e54", accent: "#7c6af7",
};
const s = (obj) => Object.entries(obj).map(([k, v]) => `${k.replace(/([A-Z])/g, "-$1").toLowerCase()}:${v}`).join(";");

// ═══════════════════════════════════════════════════════
// STYLED PRIMITIVES

const Tag = ({ children, color = C.blue }) => (
  <span style={{ fontSize: 10, padding: "1px 5px", borderRadius: 3, marginLeft: 4,
    background: color + "22", color, border: `1px solid ${color}44`, verticalAlign: "middle" }}>
    {children}
  </span>
);

const Btn = ({ children, onClick, variant = "primary", disabled = false, style: extra = {} }) => {
  const base = { cursor: disabled ? "not-allowed" : "pointer", borderRadius: 4, fontFamily: "inherit", fontSize: 13,
    padding: "7px 18px", transition: "all .18s", border: "none", opacity: disabled ? 0.5 : 1 };
  const variants = {
    primary:   { background: C.gold, color: "#0a0c10", fontWeight: 700 },
    secondary: { background: "transparent", color: C.dim, border: `1px solid ${C.border}` },
    ghost:     { background: "transparent", color: C.dim, border: `1px dashed ${C.border}`, padding: "4px 10px", fontSize: 12 },
    danger:    { background: "transparent", color: C.red, border: `1px solid ${C.red}44` },
    accent:    { background: C.accent, color: "#fff", fontWeight: 700 },
    dark:      { background: C.surface2, color: C.dim, border: `1px solid ${C.border}` },
  };
  return <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{ ...base, ...variants[variant], ...extra }}>{children}</button>;
};

const Input = ({ label, ...props }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 11, color: C.dim, letterSpacing: "0.04em" }}>{label}</label>}
    <input {...props} style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text,
      padding: "7px 10px", borderRadius: 4, fontFamily: "monospace", fontSize: 13, outline: "none",
      width: "100%", boxSizing: "border-box", ...(props.style || {}) }} />
  </div>
);

const Select = ({ label, children, ...props }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 11, color: C.dim, letterSpacing: "0.04em" }}>{label}</label>}
    <select {...props} style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text,
      padding: "7px 10px", borderRadius: 4, fontFamily: "inherit", fontSize: 13, outline: "none", width: "100%", boxSizing: "border-box" }}>
      {children}
    </select>
  </div>
);

const Modal = ({ open, title, onClose, onSave, children }) => {
  if (!open) return null;
  return (
    <div onClick={e => e.target === e.currentTarget && onClose()}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.8)", zIndex: 300,
        display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ background: C.surface, border: `1px solid ${C.gold}`, borderRadius: 8,
        padding: 24, width: "100%", maxWidth: 440, maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ color: C.goldLight, fontWeight: 700, fontSize: 15, marginBottom: 16 }}>{title}</div>
        {children}
        <div style={{ display: "flex", gap: 8, marginTop: 16, justifyContent: "flex-end" }}>
          <Btn variant="secondary" onClick={onClose}>取消</Btn>
          {onSave && <Btn onClick={onSave}>儲存</Btn>}
        </div>
      </div>
    </div>
  );
};

const Divider = () => <div style={{ height: 1, background: C.border, margin: "8px 0" }} />;

const FR = ({ label, value, valueColor }) => (
  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 12 }}>
    <span style={{ color: C.dim }}>{label}</span>
    <span style={{ fontFamily: "monospace", color: valueColor || C.text }}>{value}</span>

);

const SectionHeader = ({ children }) => (

);
