// TAB: BACKUP / RESTORE
// ═══════════════════════════════════════════════════════
const BACKUP_KEY = "pokerclub_backups";

function TabBackup({ data, setData }) {
  const dialog = useDialog();
  const [exportText, setExportText] = useState("");
  const [importText, setImportText] = useState("");
  const [msg, setMsg] = useState("");
  const [showCloud, setShowCloud] = useState(false);
  const [cloudBackups, setCloudBackups] = useState([]);
  const [cloudBusy, setCloudBusy] = useState(false);
  const [note, setNote] = useState("");

  const showMsg = (text, isErr = false) => {
    setMsg({ text, isErr });
    setTimeout(() => setMsg(""), 4000);
  };

  // ── 主要備份方式：複製貼上 JSON ──
  const generateExport = () => {
    setExportText(JSON.stringify(data, null, 2));
    showMsg("✅ 已產生 JSON，請複製文字框內容並貼到備忘錄/LINE 保存");
  };

  const copyToClipboard = async () => {
    if (!exportText) {
      showMsg("⚠️ 請先按「產生備份 JSON」", true);
      return;
    }
    try {
      await navigator.clipboard.writeText(exportText);
      showMsg("✅ 已複製到剪貼簿");
    } catch (e) {
      showMsg("❌ 自動複製失敗，請手動長按文字框選取後複製", true);
    }
  };

  const importFromText = async () => {
    if (!importText.trim()) {
      showMsg("⚠️ 請貼上備份 JSON 文字", true);
      return;
    }
    if (!(await dialog.confirm("匯入後當前資料會被覆蓋，確定？"))) return;
    try {
      const parsed = JSON.parse(importText);
      if (!parsed.sessions || !parsed.members) throw new Error("格式不正確：缺少 sessions 或 members");
      setData(() => parsed);
      setImportText("");
      showMsg("✅ 匯入成功");
    } catch (e) {
      showMsg("❌ 匯入失敗：" + e.message, true);
    }
  };

  // ── 雲端備份：使用 Firestore 子集合 ──
  const loadCloudBackups = async () => {
    setCloudBusy(true);
    try {
      const fb = await getFirebase();
      const colRef = fb.collection(fb.db, BACKUP_COL);
      const q = fb.query(colRef, fb.orderBy("ts", "desc"), fb.limit(20));
      const snap = await fb.getDocs(q);
      const list = [];
      snap.forEach(d => {
        const x = d.data();
        list.push({
          id: d.id, ts: x.ts, note: x.note || "",
          sessionCount: x.sessionCount, memberCount: x.memberCount, expenseCount: x.expenseCount,
          sizeKB: x.sizeKB || 0,
        });
      });
      setCloudBackups(list);
    } catch (e) {
      console.error(e);
      setCloudBackups([]);
    }
    setCloudBusy(false);
  };

  useEffect(() => {
    if (showCloud) loadCloudBackups();
  }, [showCloud]);

  const createCloudBackup = async () => {
    setCloudBusy(true);
    try {
      const fb = await getFirebase();
      const id = "b" + Date.now();
      const snapshot = JSON.stringify(data);
      const sizeKB = Math.round(snapshot.length / 1024);
      await fb.setDoc(fb.doc(fb.db, BACKUP_COL, id), {
        ts: Date.now(), note: note || "",
        sessionCount: data.sessions.length,
        memberCount: data.members.length,
        expenseCount: (data.expenses || []).length,
        sizeKB, snapshot,
      });
      await loadCloudBackups();
      setNote("");
      showMsg(`✅ 雲端備份已建立 (${sizeKB}KB)`);
    } catch (e) {
      showMsg("❌ 雲端備份失敗：" + e.message, true);
    }
    setCloudBusy(false);
  };

  const restoreCloud = async (backup) => {
    if (!(await dialog.confirm(`還原到 ${new Date(backup.ts).toLocaleString("zh-TW")} 的備份？當前資料會被覆蓋`))) return;
    try {
      const fb = await getFirebase();
      const snap = await fb.getDoc(fb.doc(fb.db, BACKUP_COL, backup.id));
      if (!snap.exists()) throw new Error("找不到備份內容");
      const restored = JSON.parse(snap.data().snapshot);
      setData(() => restored);
      showMsg("✅ 已還原");
    } catch (e) {
      showMsg("❌ 還原失敗：" + e.message, true);
    }
  };

  const deleteCloud = async (id) => {
    if (!(await dialog.confirm("確定刪除此備份？"))) return;
    try {
      const fb = await getFirebase();
      await fb.deleteDoc(fb.doc(fb.db, BACKUP_COL, id));
      setCloudBackups(cloudBackups.filter(b => b.id !== id));
      showMsg("已刪除");
    } catch (e) {
      showMsg("❌ 刪除失敗：" + e.message, true);
    }
  };

  const clearAllCloud = async () => {
    if (!(await dialog.confirm("確定清空所有雲端備份？"))) return;
    try {
      const fb = await getFirebase();
      for (const b of cloudBackups) {
        try { await fb.deleteDoc(fb.doc(fb.db, BACKUP_COL, b.id)); } catch {}
      }
      setCloudBackups([]);
      showMsg("✅ 已清空");
    } catch (e) {
      showMsg("❌ 清空失敗：" + e.message, true);
    }
  };

  const fmtDate = (ts) => new Date(ts).toLocaleString("zh-TW", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });

  return (
    <div style={{ maxWidth: 720 }}>
      {msg && (
        <div style={{ background: msg.isErr ? C.red+"22" : C.green+"22",
          border: `1px solid ${msg.isErr ? C.red : C.green}44`,
          color: msg.isErr ? C.red : C.green,
          padding: "8px 14px", borderRadius: 4, marginBottom: 14, fontSize: 13 }}>{msg.text}</div>
      )}

      {/* 主要備份：複製貼上 JSON（最可靠） */}
      <div style={{ background: C.surface, border: `1px solid ${C.gold}`, borderRadius: 8, padding: 18, marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.goldLight, marginBottom: 6 }}>
          💾 備份 JSON（推薦使用）
        </div>
        <div style={{ fontSize: 11, color: C.dim, marginBottom: 12, lineHeight: 1.5 }}>
          這是最可靠的方式：產生 JSON 文字後複製貼到備忘錄或 LINE 保存。<br />
          目前資料：{data.sessions.length} 場 · {data.members.length} 成員 · {(data.expenses || []).length} 公積金支出
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
          <Btn onClick={generateExport}>📋 產生備份 JSON</Btn>
          {exportText && <Btn variant="secondary" onClick={copyToClipboard}>📑 一鍵複製</Btn>}
        </div>
        {exportText && (
          <textarea readOnly value={exportText} onClick={e => e.target.select()}
            style={{ width: "100%", minHeight: 120, background: C.surface2, border: `1px solid ${C.border}`,
              color: C.text, padding: 10, borderRadius: 4, fontFamily: "monospace", fontSize: 11,
              outline: "none", resize: "vertical", boxSizing: "border-box" }} />
        )}
      </div>

      {/* 重置為內建資料 */}
      <div style={{ background: C.surface, border: `1px solid ${C.red}55`, borderRadius: 8, padding: 18, marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.red, marginBottom: 6 }}>
          🔧 重置為內建預設資料（4場 + 20成員）
        </div>
        <div style={{ fontSize: 11, color: C.dim, marginBottom: 10, lineHeight: 1.5 }}>
          ⚠️ 用於修復 Firebase 上的損壞資料 — 會把當前 Firebase 上的資料蓋掉，恢復成 HTML 內建的乾淨版本（包含 4 場、20 成員、1 筆公積金支出）。如果你看到亂碼或資料不對，按這個。
        </div>
        <Btn variant="danger" onClick={async () => {
          if (!(await dialog.confirm("確定用內建資料覆蓋當前 Firebase？\n\n這會清除所有目前的資料！如果你最近有新增場次，務必先複製 JSON 備份！"))) return;
          if (!(await dialog.confirm("再確認一次：真的要覆蓋？"))) return;
          setData(() => USER_DEFAULT_DATA);
          showMsg("✅ 已重置為內建資料");
        }}>🔧 用內建資料覆蓋</Btn>
      </div>

      {/* 從 JSON 還原 */}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 18, marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.goldLight, marginBottom: 6 }}>
          🔄 從 JSON 還原
        </div>
        <div style={{ fontSize: 11, color: C.dim, marginBottom: 10 }}>把先前複製的 JSON 文字貼進來，按「匯入」即可還原</div>
        <textarea value={importText} onChange={e => setImportText(e.target.value)}
          placeholder="貼上 JSON 文字..."
          style={{ width: "100%", minHeight: 100, background: C.surface2, border: `1px solid ${C.border}`,
            color: C.text, padding: 10, borderRadius: 4, fontFamily: "monospace", fontSize: 11,
            outline: "none", resize: "vertical", boxSizing: "border-box", marginBottom: 10 }} />
        <Btn onClick={importFromText}>⬆️ 匯入</Btn>
      </div>

      {/* 雲端備份（折疊） */}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 18 }}>
        <div onClick={() => setShowCloud(!showCloud)}
          style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.dim }}>
            🗂 雲端備份歷史 {showCloud ? "▼" : "▶"}
          </div>
          <span style={{ fontSize: 11, color: C.muted }}>（不穩定，僅作輔助）</span>
        </div>

        {showCloud && (
          <div style={{ marginTop: 14 }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "stretch" }}>
              <input type="text" placeholder="備註（選填）"
                value={note} onChange={e => setNote(e.target.value)}
                style={{ flex: 1, minWidth: 120, background: C.surface2, border: `1px solid ${C.border}`, color: C.text,
                  padding: "7px 10px", borderRadius: 4, fontSize: 13, outline: "none" }} />
              <Btn onClick={createCloudBackup} disabled={cloudBusy}>📸 雲端備份</Btn>
              {cloudBackups.length > 0 && (
                <button onClick={clearAllCloud} style={{ background: "transparent", border: `1px solid ${C.red}55`,
                  color: C.red, padding: "0 12px", borderRadius: 4, cursor: "pointer", fontSize: 11, fontFamily: "inherit" }}>
                  🗑 清空
                </button>
              )}
            </div>
            {cloudBusy ? <div style={{ color: C.dim, fontSize: 13 }}>讀取中...</div>
              : cloudBackups.length === 0 ? <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "16px 0" }}>沒有雲端備份</div>
              : cloudBackups.map(b => (
                <div key={b.id} style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 6,
                  padding: "10px 14px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontFamily: "monospace", fontSize: 12, color: C.goldLight }}>{fmtDate(b.ts)}</div>
                    <div style={{ fontSize: 10, color: C.dim, marginTop: 2 }}>
                      {b.sessionCount}場 · {b.memberCount}成員{b.sizeKB ? ` · ${b.sizeKB}KB` : ""}{b.note && ` · ${b.note}`}
                    </div>
                  </div>
                  <Btn variant="secondary" onClick={() => restoreCloud(b)} style={{ fontSize: 10, padding: "4px 10px" }}>🔄 還原</Btn>
                  <button onClick={() => deleteCloud(b.id)}
                    style={{ background: "transparent", border: `1px solid ${C.border}`, color: C.muted,
                      padding: "4px 8px", borderRadius: 4, cursor: "pointer", fontSize: 10 }}>🗑</button>
                </div>
              ))
            }
          </div>
        )}
      </div>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════
const TABS = [
  { id: "new",      label: "➕ 新增" },
  { id: "records",  label: "📋 場次" },
  { id: "settle",   label: "💸 結算" },
  { id: "cumul",    label: "📊 統計" },
  { id: "reserve",  label: "🏦 公積金" },
  { id: "bonus",    label: "🃏 特殊牌" },
  { id: "members",  label: "👥 成員" },
  { id: "backup",   label: "🛡️ 備份" },
];

function PokerApp() {
  const isReadonly = typeof window !== "undefined" && window.__readonly === true;
  const visibleTabs = isReadonly ? TABS.filter(t => t.id === "cumul") : TABS;
  const [tab, setTab] = useState(isReadonly ? "cumul" : "new");
  const [data, setDataState] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [editingId, setEditingId] = useState(null);

  const handleEdit = (sessionId) => {
    setEditingId(sessionId);
    setTab("new");
  };

  // Load from Firebase + 即時同步
  const [hasLoaded, setHasLoaded] = useState(false);
  const [error, setError] = useState("");
  const isWritingRef = useRef(false);
  const fbRef = useRef(null);

  useEffect(() => {
    let unsubscribe = null;
    (async () => {
      try {
        const fb = await getFirebase();
        fbRef.current = fb;
        const dataDoc = fb.doc(fb.db, "pokerclub", "main");

        // 第一次載入
        const snap = await fb.getDoc(dataDoc);
        if (snap.exists() && snap.data().payload) {
          setDataState(JSON.parse(snap.data().payload));
        } else {
          await fb.setDoc(dataDoc, { payload: JSON.stringify(USER_DEFAULT_DATA), updatedAt: Date.now() });
          setDataState(USER_DEFAULT_DATA);
        }
        setLoading(false);
        setTimeout(() => setHasLoaded(true), 100);

        // 訂閱即時更新
        unsubscribe = fb.onSnapshot(dataDoc, (snap) => {
          if (isWritingRef.current) return;
          if (snap.exists() && snap.data().payload) {
            setDataState(JSON.parse(snap.data().payload));
          }
        });
      } catch (e) {
        setError("Firebase 連線失敗：" + e.message);
        setDataState(USER_DEFAULT_DATA);
        setLoading(false);
      }
    })();
    return () => { if (unsubscribe) unsubscribe(); };
  }, []);

  // Save to Firebase whenever data changes
  const setData = useCallback((updater) => {
    setDataState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (!hasLoaded || !fbRef.current) return next;

      const fb = fbRef.current;
      const dataDoc = fb.doc(fb.db, "pokerclub", "main");
      isWritingRef.current = true;
      setSaving(true);
      fb.setDoc(dataDoc, { payload: JSON.stringify(next), updatedAt: Date.now() })
        .then(() => {
          setTimeout(() => { setSaving(false); isWritingRef.current = false; }, 500);
        })
        .catch((e) => {
          setSaving(false);
          isWritingRef.current = false;
          setError("儲存失敗：" + e.message);
        });
      return next;
    });
  }, [hasLoaded]);

  if (loading) return (
    <div style={{ background: C.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.dim, fontFamily: "monospace" }}>
      載入中...
    </div>
  );

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: "'Noto Serif TC', serif" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg,#0a0c10,#12151e)", borderBottom: `1px solid ${C.gold}`,
        padding: "12px 20px", display: "flex", alignItems: "center", justifyContent: "space-between",
        position: "sticky", top: 0, zIndex: 100, gap: 10, flexWrap: "wrap" }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700, color: C.goldLight, letterSpacing: "0.1em" }}>🦈 LEDGER</div>
          <div style={{ fontSize: 10, color: error ? C.red : C.dim, fontFamily: "monospace", marginTop: 1 }}>
            FIREBASE · {error ? "❌ " + error : (saving ? "⏳ 儲存中..." : "✓ 已同步")}
            {isReadonly ? (
              <span style={{ marginLeft: 8, color: C.blue, fontWeight: 700 }}>👁 唯讀模式</span>
            ) : (
              <>
                {typeof window !== "undefined" && window.__currentUser && <span style={{ marginLeft: 8, color: C.gold }}>👤 {window.__currentUser}</span>}
                <button onClick={() => {
                  try { localStorage.removeItem("guandi_user"); } catch(e) {}
                  window.__currentUser = null;
                  if (typeof _showUserGate === "function") _showUserGate();
                }} style={{ marginLeft: 8, background: "transparent", border: `1px solid ${C.border}`,
                  color: C.muted, padding: "0 6px", borderRadius: 3, cursor: "pointer", fontSize: 9, fontFamily: "inherit" }}>切換</button>
              </>
            )}
          </div>
        </div>
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
          {visibleTabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ background: tab === t.id ? "rgba(201,168,76,.12)" : "transparent",
                border: `1px solid ${tab === t.id ? C.gold : C.border}`,
                color: tab === t.id ? C.gold : C.dim,
                padding: "5px 11px", borderRadius: 4, cursor: "pointer",
                fontFamily: "inherit", fontSize: 12, transition: "all .15s" }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Body */}
      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "22px 16px" }}>
        {/* 未結算場次提示橫條（唯讀模式不顯示） */}
        {!isReadonly && (() => {
          const unsettled = data.sessions.filter(s => !s.settled);
          if (unsettled.length === 0) return null;
          return (
            <div style={{ background: C.red+"15", border: `1px solid ${C.red}55`, borderRadius: 6,
              padding: "10px 14px", marginBottom: 14, display: "flex", justifyContent: "space-between",
              alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <div style={{ fontSize: 13, color: C.red, fontWeight: 600 }}>
                📌 進行中：{unsettled.map(s => s.date).join("、")}
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {unsettled.map(s => (
                  <button key={s.id} onClick={() => handleEdit(s.id)}
                    style={{ background: C.red+"22", border: `1px solid ${C.red}66`, color: C.red,
                      padding: "4px 10px", borderRadius: 4, cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 600 }}>
                    繼續編輯 {s.date}
                  </button>
                ))}
              </div>
            </div>
          );
        })()}
        <div style={{ marginBottom: 16 }}>
          <SectionHeader>{TABS.find(t => t.id === tab)?.label || ""}</SectionHeader>
        </div>
        {isReadonly ? (
          <TabCumul data={data} />
        ) : (
          <>
            {tab === "records"  && <TabRecords  data={data} setData={setData} onEdit={handleEdit} />}
            {tab === "new"      && <TabNew      data={data} setData={setData} editingId={editingId} clearEditing={() => setEditingId(null)} />}
            {tab === "settle"   && <TabSettle   data={data} setData={setData} />}
            {tab === "cumul"    && <TabCumul    data={data} />}
            {tab === "reserve"  && <TabReserve  data={data} setData={setData} />}
            {tab === "bonus"    && <TabBonus    data={data} />}
            {tab === "members"  && <TabMembers  data={data} setData={setData} />}
            {tab === "backup"   && <TabBackup   data={data} setData={setData} />}
          </>
        )}
      </div>
    </div>
  );
}

function App() {
  return (
    <DialogProvider>
      <PokerApp />
    </DialogProvider>
  );
}


document.getElementById("loading").style.display = "none";
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
